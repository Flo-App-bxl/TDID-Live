permissions:
  contents: write

name: Auto-clean folders

on:
  schedule:
    - cron: "*/2 * * * *"  # toutes les 3 minutes
  workflow_dispatch:         # permet aussi de le lancer à la main

jobs:
  cleanup:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Check and clean folders
        run: |
          # --- Paramètres ---
          MAX_FILES=10
          FOLDERS=("mirror_brel" "mirror_delta" "mirror_erasme")

          for FOLDER in "${FOLDERS[@]}"; do
            echo "🔍 Vérification du dossier $FOLDER..."
            if [ ! -d "$FOLDER" ]; then
              echo "ℹ️ Dossier $FOLDER introuvable, on passe."
              continue
            fi

            COUNT=$(find "$FOLDER" -type f | wc -l || echo 0)
            echo "→ $COUNT fichiers détectés"

            if [ "$COUNT" -gt "$MAX_FILES" ]; then
              echo "⚠️ Trop de fichiers ($COUNT > $MAX_FILES), suppression du dossier $FOLDER..."
              rm -rf "$FOLDER"
            else
              echo "✅ OK : $FOLDER contient $COUNT fichiers"
            fi
          done

      - name: Commit and push if changes
        run: |
          if [ -n "$(git status --porcelain)" ]; then
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add -A
            git commit -m "Auto-clean: suppression automatique (plus de 10 fichiers)"
            git push
          else
            echo "Aucun changement à pousser."
          fi
