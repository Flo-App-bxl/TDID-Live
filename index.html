<!doctype html>
<html lang="fr">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>TDID Live – Brel / Delta / Erasm.</title>
<style>
  :root{--bg:#0f1115;--fg:#eaeef5;--card:#141923;--line:#1e2330;--accent:#1a5bff;--ok:#18c58f;--warn:#f2b636;--err:#ff4d4f}
  html,body{height:100%;margin:0;background:var(--bg);color:var(--fg);font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif}
  body{display:flex;flex-direction:column}
  .top{flex-shrink:0;height:64px;display:flex;gap:8px;align-items:center;padding:10px 12px;background:#12151bde;border-bottom:1px solid var(--line);backdrop-filter:blur(6px);z-index:10}
  .brand{font-weight:700;margin-right:8px}
  .btn{padding:8px 14px;border:1px solid var(--line);border-radius:12px;background:var(--card);color:var(--fg);cursor:pointer}
  .btn.active{background:var(--accent);color:#fff;border-color:transparent}
  .wrap{flex:1;display:flex;align-items:center;justify-content:center;overflow:hidden}
  img{max-width:100%;max-height:100%;object-fit:contain;display:block;margin:auto}
  .status{display:flex;align-items:center;gap:8px;margin-left:auto}
  .dot{width:10px;height:10px;border-radius:50%}
  .dot.ok{background:var(--ok)} .dot.warn{background:var(--warn)} .dot.err{background:var(--err)}
  .stamp{opacity:.9;font-size:.9em}
  .note{position:fixed;bottom:8px;left:50%;transform:translateX(-50%);opacity:.85;font-size:.85em;text-align:center;white-space:pre-line;max-width:92vw}
  .banner{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);background:rgba(242,182,54,0.7);color:#000;padding:16px 24px;border-radius:14px;font-weight:700;font-size:1.4em;z-index:20;display:none;overflow:hidden;white-space:nowrap;width:80vw;text-align:center;box-shadow:0 0 14px rgba(0,0,0,0.4);}
  .banner span{display:inline-block;padding-left:100%;animation:scrollText 15s linear infinite;}
  @keyframes scrollText{0%{transform:translateX(0);}100%{transform:translateX(-100%);}}
</style>
</head>
<body>
  <div class="top">
    <span class="brand">TDID Live</span>
    <button class="btn" id="brel">Brel</button>
    <button class="btn" id="delta">Delta</button>
    <button class="btn" id="erasme">Erasm.</button>
    <div class="status">
      <span id="led" class="dot"></span>
      <span class="stamp" id="stamp">—</span>
    </div>
  </div>
  <div class="banner" id="banner"><span>Refresh + de 10min - contrôler fiabilité via cellule ‘Last Refresh’ • Refresh +10 min – controleer betrouwbaarheid via cel ‘Last Refresh’</span></div>
  <div class="wrap"><img id="view" alt="TDID Live"></div>
  <div class="note" id="note"></div>

<script>
const GH_USER="Flo-App-bxl",GH_REPO="TDID-Live",GH_BRANCH="main";
const GH_RAW=`https://raw.githubusercontent.com/${GH_USER}/${GH_REPO}/${GH_BRANCH}`;
const GH_JSDELIVR=`https://cdn.jsdelivr.net/gh/${GH_USER}/${GH_REPO}@${GH_BRANCH}`;
const MIRROR_DIR={brel:"mirror_brel",delta:"mirror_delta",erasme:"mirror_erasme"};
const LATEST_PATH={brel:`time_brel/latest.json`,delta:`time_delta/latest.json`,erasme:`time_erasme/latest.json`};
const LATEST_URL={brel:`${GH_RAW}/${LATEST_PATH.brel}`,delta:`${GH_RAW}/${LATEST_PATH.delta}`,erasme:`${GH_RAW}/${LATEST_PATH.erasme}`};
const LATEST_URL_ALT={brel:`${GH_JSDELIVR}/${LATEST_PATH.brel}`,delta:`${GH_JSDELIVR}/${LATEST_PATH.delta}`,erasme:`${GH_JSDELIVR}/${LATEST_PATH.erasme}`};
const ERR_IMG=`${GH_RAW}/TDID_Erreur.png`;
const REFRESH_MS=6000,STALE_MS=10*60*1000,JITTER_OK=5000,LATEST_MIN_INTERVAL=60000;
const LOCAL_TTL_MS=60000,HORODATE_RE=/\/mirror_(brel|delta|erasme)\/.+\.(png|jpe?g|webp|bmp|gif)$/i;
const latestCache={brel:null,delta:null,erasme:null};
const etagMap={brel:null,delta:null,erasme:null},lmMap={brel:null,delta:null,erasme:null};
const SP_BASE="https://stibmivb-my.sharepoint.com/personal/florent_legrain_stib_brussels",SP_FOLDER="/personal/florent_legrain_stib_brussels/Documents/LiveMirror";
const spRaw=f=>`${SP_BASE}/_layouts/15/download.aspx?SourceUrl=${encodeURIComponent(SP_FOLDER+"/"+f)}`;
const DATA_SP={brel:{img:spRaw("live_brel.png")},delta:{img:spRaw("live_delta.png")},erasme:{img:spRaw("live_erasme.png")}};
const img=document.getElementById('view'),stamp=document.getElementById('stamp'),note=document.getElementById('note'),led=document.getElementById('led'),banner=document.getElementById('banner');
const btns={brel:document.getElementById('brel'),delta:document.getElementById('delta'),erasme:document.getElementById('erasme')};
let depot=localStorage.getItem('tdid_depot')||'brel';
function setActive(){for(const k in btns){btns[k].classList.toggle('active',k===depot);}}
for(const k in btns){btns[k].onclick=()=>{depot=k;localStorage.setItem('tdid_depot',depot);setActive();tick(true);};}
setActive();
const cbMinuteStrict=u=>u+(u.includes('?')?'&':'?')+'x_bypass=' + Math.floor(Date.now()/60000);
function setTop(s,l){led.className='dot '+(s==='ok'?'ok':s==='warn'?'warn':'err');stamp.textContent=`${l} • ${new Date().toLocaleString()}`;}
function saveLocal(k,v){localStorage.setItem(k,JSON.stringify({...v,savedAt:Date.now()}));}
function readLocal(k){try{return JSON.parse(localStorage.getItem(k)||"null");}catch{return null;}}
function showBanner(b){banner.style.display=b?'block':'none';}
function isFresh(ts){return(Date.now()-ts)<=LOCAL_TTL_MS;}
const toJsDelivr=r=>r.replace(GH_RAW,GH_JSDELIVR);

async function fetchWithTimeout(u,opt={},ms=6000){const c=new AbortController();const t=setTimeout(()=>c.abort(),ms);try{return await fetch(u,{...opt,signal:c.signal});}finally{clearTimeout(t);}}

async function fetchLatestJSON(urlPrimary,urlAlt,key){
  const urlP=cbMinuteStrict(urlPrimary),urlA=cbMinuteStrict(urlAlt);
  const headers={'Cache-Control':'no-cache, no-store, must-revalidate','Pragma':'no-cache','Expires':'0'};
  if(etagMap[key])headers['If-None-Match']=etagMap[key];
  if(lmMap[key])headers['If-Modified-Since']=lmMap[key];
  let diagInfo='';
  try{
    const r=await fetchWithTimeout(urlP,{cache:'no-store',headers},6000);
    diagInfo+=`RAW:${r.status} `;
    if(r.status===304&&latestCache[key]?.data)return{json:latestCache[key].dataRaw,via:'raw304',diag:diagInfo};
    if(!r.ok)throw new Error('RAW '+r.status);
    const et=r.headers.get('ETag');if(et)etagMap[key]=et;const lm=r.headers.get('Last-Modified');if(lm)lmMap[key]=lm;
    return{json:await r.json(),via:'raw',diag:diagInfo};
  }catch(e1){
    diagInfo+=`err1(${e1.message}) `;
    try{
      const r2=await fetchWithTimeout(urlA,{cache:'no-store',headers},6000);
      diagInfo+=`CDN:${r2.status} `;
      if(!r2.ok)throw new Error('CDN '+r2.status);
      return{json:await r2.json(),via:'jsdelivr',diag:diagInfo};
    }catch(e2){
      diagInfo+=`err2(${e2.message}) `;
      try{
        const r3=await fetchWithTimeout(urlP,{cache:'no-store'},6000);
        diagInfo+=`RAW2:${r3.status}`;
        if(!r3.ok)throw new Error('RAW2 '+r3.status);
        return{json:await r3.json(),via:'raw-nocond',diag:diagInfo};
      }catch(e3){return{json:null,via:'none',diag:diagInfo+` fail(${e3.message})`};}
    }
  }
}

async function readLatestRaw(k){
  const resp=await fetchLatestJSON(LATEST_URL[k],LATEST_URL_ALT[k],k);
  if(!resp.json)throw new Error(resp.diag||'Load failed');
  const j=resp.json,it=j?.items?.[k];
  if(!it?.ts)throw new Error('bad json');
  let imgUrl=it.url;
  if(!imgUrl){const f=(it.file||"").split('/').pop();if(!f)throw new Error('no file');imgUrl=`${GH_RAW}/${MIRROR_DIR[k]}/${f}`;}
  if(!HORODATE_RE.test(imgUrl))throw new Error('url not timestamped/mirror');
  const tsMs=Number(it.ts)*1000;if(!Number.isFinite(tsMs))throw new Error('bad ts');
  latestCache[k]=latestCache[k]||{};latestCache[k].dataRaw=j;latestCache[k].lastSource=resp?.via||'raw';latestCache[k].lastDiag=resp?.diag||'';return{ts:tsMs,url:imgUrl};
}
async function readLatestThrottled(k,force=false){const now=Date.now(),c=latestCache[k];if(!force&&c&&c.data&&(now-c.fetchedAt)<LATEST_MIN_INTERVAL)return c.data;const d=await readLatestRaw(k);latestCache[k]={...(latestCache[k]||{}),data:d,fetchedAt:now};return d;}
function key(d){return`tdid_last_good_${d}`;}
async function preloadWithFallback(s){const t=(u)=>new Promise(r=>{const i=new Image();i.onload=()=>r(true);i.onerror=()=>r(false);i.src=u+'?t='+Date.now();});if(await t(s))return{ok:true,url:s,via:'raw'};const a=toJsDelivr(s);if(a!==s&&await t(a))return{ok:true,url:a,via:'jsdelivr'};return{ok:false};}
function renderFrom(s,st){return new Promise(r=>{const i=new Image();i.onload=()=>{img.src=i.src;setTop(st.status,st.text);r(true);};i.onerror=()=>{setTop('err',st.text+' KO');r(false);};i.src=s+'?t='+Date.now();});}
async function renderMirrorExact(s,st){const ok1=await new Promise(r=>{const i=new Image();i.onload=()=>r({ok:true,url:s,via:'raw'});i.onerror=()=>r({ok:false});i.src=s;});if(ok1.ok){img.src=ok1.url;setTop(st.status,st.text);return{ok:true,via:ok1.via};}const a=toJsDelivr(s);const ok2=await new Promise(r=>{const i=new Image();i.onload=()=>r({ok:true,url:a,via:'jsdelivr'});i.onerror=()=>r({ok:false});i.src=a;});if(ok2.ok){img.src=ok2.url;setTop(st.status,st.text);return{ok:true,via:ok2.via};}setTop('err',st.text+' KO');return{ok:false};}

async function tick(force=false){
  const sp=DATA_SP[depot];let diag=`Depot: ${depot}\n`;let latest=null;
  try{latest=await readLatestThrottled(depot,force);}catch(e){diag+=`latest.json KO (${e.message})`;}
  const lastGood=readLocal(key(depot));
  if(!latest&&lastGood){const f=lastGood.savedAt&&isFresh(lastGood.savedAt),g=typeof lastGood.url==='string'&&HORODATE_RE.test(lastGood.url);if(f&&g){latest={ts:lastGood.ts,url:lastGood.url};diag+=`\n→ fallback local <60s`;}}
  if(!latest){await renderFrom(ERR_IMG,{status:'err',text:'Erreur'});note.textContent=diag+`\n→ Pas de données`;showBanner(false);return;}
  const ageSec=Math.round((Date.now()-latest.ts)/1000),tooOld=(Date.now()-latest.ts)>=STALE_MS;
  const lg=readLocal(key(depot));if(lg&&Math.abs(latest.ts-lg.ts)<=JITTER_OK)latest={ts:lg.ts,url:lg.url};
  if(latestCache[depot]?.lastSource)diag+=`source latest: ${latestCache[depot].lastSource}\n`;
  if(latestCache[depot]?.lastDiag)diag+=`HTTP trace: ${latestCache[depot].lastDiag}\n`;
  diag+=`age(miroir) • Δ=${ageSec}s → ${tooOld?'STALE':'OK'}`;
  if(tooOld){await renderFrom(ERR_IMG,{status:'err',text:'Erreur'});note.textContent=diag+`\n→ Miroir >10min`;showBanner(true);return;}
  saveLocal(key(depot),latest);
  const mir=await renderMirrorExact(latest.url,{status:'warn',text:'Miroir (horodaté)'});if(mir.ok){note.textContent=diag+`\nsource: Miroir (${mir.via})`;}else{await renderFrom(ERR_IMG,{status:'err',text:'Erreur'});note.textContent=diag+`\n→ Erreur (miroir KO)`;}
  showBanner(false);
}

const JITTER_START_MS=Math.floor(Math.random()*5000);
setTimeout(()=>{tick(true);setInterval(()=>tick(false),REFRESH_MS);},JITTER_START_MS);
window.addEventListener('visibilitychange',()=>{if(!document.hidden)tick(true);});
window.addEventListener('focus',()=>tick(true));
</script>
</body>
</html>
