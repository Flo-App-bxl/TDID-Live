<!doctype html>
<html lang="fr">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>TDID Live – Brel / Delta / Erasm.</title>
<style>
  :root{
    --bg:#0f1115;--fg:#eaeef5;--card:#141923;--line:#1e2330;
    --accent:#1a5bff;--ok:#18c58f;--warn:#f2b636;--err:#ff4d4f
  }
  html,body{
    height:100%;margin:0;background:var(--bg);color:var(--fg);
    font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif;
  }
  body{
    display:flex;flex-direction:column;
  }
  .top{
    flex-shrink:0;
    height:64px;
    display:flex;gap:8px;align-items:center;
    padding:10px 12px;
    background:#12151bde;
    border-bottom:1px solid var(--line);
    backdrop-filter:blur(6px);
    z-index:10;
  }
  .brand{font-weight:700;margin-right:8px}
  .btn{
    padding:8px 14px;border:1px solid var(--line);
    border-radius:12px;background:var(--card);
    color:var(--fg);cursor:pointer;
    transition:background .2s;
  }
  .btn:hover{background:#1a1f2a}
  .btn.active{background:var(--accent);color:#fff;border-color:transparent}
  .wrap{
    flex:1;display:flex;align-items:center;justify-content:center;
    overflow:hidden;
  }
  img{
    max-width:100%;max-height:100%;object-fit:contain;
    display:block;margin:auto;
  }
  .status{display:flex;align-items:center;gap:8px;margin-left:auto}
  .dot{width:10px;height:10px;border-radius:50%}
  .dot.ok{background:var(--ok)} 
  .dot.warn{background:var(--warn)} 
  .dot.err{background:var(--err)}
  .stamp{opacity:.9;font-size:.9em}
  .note{
    position:fixed;bottom:8px;left:50%;
    transform:translateX(-50%);
    opacity:.85;font-size:.85em;
    text-align:center;white-space:pre-line;
    max-width:92vw;
  }
</style>
</head>
<body>
  <div class="top">
    <span class="brand">TDID Live</span>
    <button class="btn" id="brel">Brel</button>
    <button class="btn" id="delta">Delta</button>
    <button class="btn" id="erasme">Erasm.</button>
    <div class="status">
      <span id="led" class="dot"></span>
      <span class="stamp" id="stamp">—</span>
    </div>
  </div>

  <div class="wrap">
    <img id="view" alt="TDID Live">
  </div>
  <div class="note" id="note"></div>

<script>
/* ========= CONFIG ========= */
const GH_USER   = "Flo-App-bxl";
const GH_REPO   = "TDID-Live";
const GH_BRANCH = "main";
const API_BASE  = "https://api.github.com";
const GH_RAW    = `https://raw.githubusercontent.com/${GH_USER}/${GH_REPO}/${GH_BRANCH}`;

const MIRROR_DIR = { brel:"mirror_brel", delta:"mirror_delta", erasme:"mirror_erasme" };
const ERR_IMG   = `${GH_RAW}/TDID_Erreur.png`;
const REFRESH_MS = 3000;
const STALE_MS   = 10*60*1000; // 10 min

/* --- SharePoint (optionnel si accessible) --- */
const SP_BASE   = "https://stibmivb-my.sharepoint.com/personal/florent_legrain_stib_brussels";
const SP_FOLDER = "/personal/florent_legrain_stib_brussels/Documents/LiveMirror";
const spRaw = f => `${SP_BASE}/_layouts/15/download.aspx?SourceUrl=${encodeURIComponent(SP_FOLDER + "/" + f)}`;
const DATA_SP = {
  brel:   { img: spRaw("live_brel.png") },
  delta:  { img: spRaw("live_delta.png") },
  erasme: { img: spRaw("live_erasme.png") }
};

/* ========= UI ========= */
const img   = document.getElementById('view');
const stamp = document.getElementById('stamp');
const note  = document.getElementById('note');
const led   = document.getElementById('led');
const btns  = { brel:document.getElementById('brel'), delta:document.getElementById('delta'), erasme:document.getElementById('erasme') };

let depot = localStorage.getItem('tdid_depot') || 'brel';
function setActive(){ for(const k in btns){ btns[k].classList.toggle('active', k===depot); } }
for(const k in btns){ btns[k].onclick = () => { depot=k; localStorage.setItem('tdid_depot', depot); setActive(); tick(true); }; }
setActive();

const cb = u => u + (u.includes('?')?'&':'?') + 't=' + Date.now();
function setTop(status, label){
  led.className = 'dot ' + (status==='ok'?'ok':status==='warn'?'warn':'err');
  stamp.textContent = `${label} • ${new Date().toLocaleString()}`;
}

/* ========= ETag Cache (anti-quota) ========= */
const etagStore = {
  get(key){ try { return JSON.parse(localStorage.getItem(key)||"null"); } catch { return null; } },
  set(key,val){ localStorage.setItem(key, JSON.stringify(val)); }
};

async function getHeadShaETag(){
  const url = `${API_BASE}/repos/${GH_USER}/${GH_REPO}/git/refs/heads/${GH_BRANCH}`;
  const key = `etag:${url}`;
  const cached = etagStore.get(key);
  const headers = { 'Accept': 'application/vnd.github+json' };
  if (cached?.etag) headers['If-None-Match'] = cached.etag;

  const r = await fetch(url, {headers, cache:'no-store'});
  if (r.status === 304 && cached?.body) return cached.body.object.sha;
  if (!r.ok) throw new Error('ref:'+r.status);
  const etag = r.headers.get('ETag');
  const body = await r.json();
  if (etag) etagStore.set(key, {etag, body});
  return body?.object?.sha;
}

async function getLatestJsonAtRefETag(depotKey, refSha){
  const path = `time_${depotKey}/latest.json`;
  const url  = `${API_BASE}/repos/${GH_USER}/${GH_REPO}/contents/${path}?ref=${refSha}`;
  const key  = `etag:${url}`;
  const cached = etagStore.get(key);
  const headers = { 'Accept': 'application/vnd.github+json' };
  if (cached?.etag) headers['If-None-Match'] = cached.etag;

  const r = await fetch(url, {headers, cache:'no-store'});
  if (r.status === 304 && cached?.json) return cached.json;
  if (!r.ok) throw new Error('content:'+r.status);
  const etag = r.headers.get('ETag');
  const j = await r.json();
  const txt = atob(String(j.content||"").replace(/\s/g,''));
  const json = JSON.parse(txt);
  if (etag) etagStore.set(key, {etag, json});
  return json;
}

/* ========= Charge latest.json avec fallback RAW ========= */
async function loadLatest(depotKey){
  try{
    const ref = await getHeadShaETag();
    const j   = await getLatestJsonAtRefETag(depotKey, ref);
    const it  = j?.items?.[depotKey];
    if (!it?.ts) return null;
    let url = it.url;
    if (!url){
      const f = (it.file||"").split('/').pop();
      url = `${GH_RAW}/${MIRROR_DIR[depotKey]}/${f}`;
    }
    return { ts: it.ts*1000, url, ref };
  }catch{
    try{
      const r = await fetch(`${GH_RAW}/time_${depotKey}/latest.json?bust=${Date.now()}`, {cache:'no-store'});
      if (!r.ok) throw 0;
      const j = await r.json();
      const it = j?.items?.[depotKey];
      if (!it?.ts) return null;
      let url = it.url || `${GH_RAW}/${MIRROR_DIR[depotKey]}/${(it.file||"").split('/').pop()}`;
      return { ts: it.ts*1000, url, ref:'raw' };
    }catch{ return null; }
  }
}

/* ========= utils image ========= */
function preload(src, withCred=false){
  return new Promise(res=>{
    const t = new Image();
    if (withCred) t.referrerPolicy = 'no-referrer-when-downgrade';
    t.onload  = ()=>res(true);
    t.onerror = ()=>res(false);
    t.src = cb(src);
  });
}
async function renderFrom(src, statusLabel){
  return new Promise(res=>{
    const loader = new Image();
    loader.onload = ()=>{ img.src = loader.src; setTop(statusLabel.status, statusLabel.text); res(true); };
    loader.onerror= ()=>{ setTop('err', statusLabel.text + ' KO'); res(false); };
    loader.src = cb(src);
  });
}

/* ========= boucle principale ========= */
async function tick(force=false){
  const sp = DATA_SP[depot];
  let diag = `Depot: ${depot}\n`;

  const latest = await loadLatest(depot);
  if (!latest){
    diag += "latest.json indisponible (API/RAW)";
    const okSP = await preload(sp.img, true);
    if (okSP){ await renderFrom(sp.img, {status:'ok', text:'SP'}); }
    else { await renderFrom(ERR_IMG, {status:'err', text:'Erreur'}); }
    note.textContent = diag;
    return;
  }

  const ageMs = Date.now() - latest.ts;
  const ageSec = Math.round(ageMs/1000);
  const stale = ageMs >= STALE_MS;
  diag += `ref=${latest.ref||'raw'} • Δ=${ageSec}s → ${stale?'STALE':'OK'}`;

  if (stale){
    await renderFrom(ERR_IMG, {status:'err', text:'Erreur (≥10min)'});
    note.textContent = diag + "\n→ Miroir en retard";
    return;
  }

  const spOK = await preload(sp.img, true);
  if (spOK){
    await renderFrom(sp.img, {status:'ok', text:'SP'});
    note.textContent = diag + "\nsource: SP";
    return;
  }

  const mirOK = await preload(latest.url);
  if (mirOK){
    await renderFrom(latest.url, {status:'warn', text:'Miroir'});
    note.textContent = diag + "\nsource: Miroir";
  } else {
    await renderFrom(ERR_IMG, {status:'err', text:'Erreur'});
    note.textContent = diag + "\n→ Erreur (miroir & SP KO)";
  }
}

/* ========= start ========= */
setInterval(()=>tick(false), REFRESH_MS);
tick(true);
</script>
</body>
</html>
