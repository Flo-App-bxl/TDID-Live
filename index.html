<!doctype html>
<html lang="fr">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>TDID Live – Brel / Delta / Erasm.</title>
<style>
  :root{--bg:#0f1115;--fg:#eaeef5;--card:#141923;--line:#1e2330;--accent:#1a5bff}
  html,body{height:100%;margin:0;background:var(--bg);color:var(--fg);font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif}
  body{padding-top:64px}
  .top{position:fixed;top:0;left:0;right:0;height:64px;display:flex;gap:8px;align-items:center;padding:10px 12px;background:#12151bde;border-bottom:1px solid var(--line);backdrop-filter:blur(6px);z-index:10}
  .brand{font-weight:700;margin-right:8px}
  .btn{padding:8px 14px;border:1px solid var(--line);border-radius:12px;background:var(--card);color:var(--fg);cursor:pointer}
  .btn.active{background:var(--accent);color:#fff;border-color:transparent}
  .wrap{height:calc(100vh - 64px);display:flex;align-items:center;justify-content:center}
  img{max-width:100%;max-height:100%;object-fit:contain}
  .stamp{margin-left:auto;opacity:.85;font-size:.9em}
  .note{position:fixed;bottom:8px;left:50%;transform:translateX(-50%);opacity:.9;font-size:.9em;text-align:center;white-space:pre-line}
</style>
</head>
<body>
  <div class="top">
    <span class="brand">TDID Live</span>
    <button class="btn" id="brel">Brel</button>
    <button class="btn" id="delta">Delta</button>
    <button class="btn" id="erasme">Erasm.</button>
    <span class="stamp" id="stamp">—</span>
  </div>

  <div class="wrap"><img id="view" alt="TDID Live"></div>
  <div class="note" id="note"></div>

<script>
/* ====== CONFIG ====== */
/* GitHub Pages: où sont stockées les images “miroir” */
const GH_OWNER   = "Flo-App-bxl";
const GH_REPO    = "TDID-Live";
const GH_BRANCH  = "gh-pages";
const GH_API_DIR = `https://api.github.com/repos/${GH_OWNER}/${GH_REPO}/contents/mirror?ref=${GH_BRANCH}`;
const GH_RAW     = `https://${GH_OWNER}.github.io/${GH_REPO}/mirror`;

/* SharePoint (si connecté STIB) pour les .age.txt et fallback image directe si voulu) */
const SP_BASE   = "https://stibmivb-my.sharepoint.com/personal/florent_legrain_stib_brussels";
const SP_FOLDER = "/personal/florent_legrain_stib_brussels/Documents/LiveMirror";
function spRaw(file){
  const src = `${SP_FOLDER}/${file}`;
  return `${SP_BASE}/_layouts/15/download.aspx?SourceUrl=${encodeURIComponent(src)}`;
}

/* Fichiers d'âge côté SP */
const SP_AGE = {
  brel:   spRaw("live_brel.age.txt"),
  delta:  spRaw("live_delta.age.txt"),
  erasme: spRaw("live_erasme.age.txt")
};

const ERR_IMG    = spRaw("TDID_Erreur.png"); // ou héberge-la aussi dans /mirror si tu préfères
const REFRESH_MS = 3000;      // 3 s
const STALE_MS   = 5 * 60 * 1000; // 5 minutes
/* ===================== */

const img   = document.getElementById('view');
const stamp = document.getElementById('stamp');
const note  = document.getElementById('note');
const btns  = {
  brel:   document.getElementById('brel'),
  delta:  document.getElementById('delta'),
  erasme: document.getElementById('erasme')
};
let depot = localStorage.getItem('tdid_depot') || 'brel';
let lastOk = 0;

function setActive(){ for(const k in btns){ btns[k].classList.toggle('active', k===depot); } }
for(const k in btns){
  btns[k].onclick = () => { depot=k; localStorage.setItem('tdid_depot', depot); setActive(); tick(true); };
}
setActive();

const cb = u => u + (u.includes('?')?'&':'?') + 't=' + Date.now();

/* Parse "brel_20251101T203843Z.png" -> epoch ms */
function parseIsoName(name){
  const m = name.match(/_(\d{8}T\d{6}Z)\.png$/i);
  if(!m) return null;
  const d = new Date(m[1]); // UTC
  const ms = d.getTime();
  return Number.isFinite(ms) ? ms : null;
}

/* Fetch liste mirror/ et retourne la meilleure image pour le dépôt */
async function pickLatestFromMirror(depot){
  const prefix = (depot==="erasme" ? "erasme_" : depot+"_");
  const r = await fetch(GH_API_DIR, {cache:'no-store'});
  if(!r.ok) throw new Error("GitHub API dir HTTP "+r.status);
  const arr = await r.json();
  const files = arr.filter(x => x.type==="file" && x.name.startsWith(prefix) && x.name.endsWith(".png"));
  if(!files.length) return null;
  // trier par nom décroissant (timestamp intégré)
  files.sort((a,b)=> b.name.localeCompare(a.name));
  const name = files[0].name;
  const url  = `${GH_RAW}/${name}`;
  const ms   = parseIsoName(name);
  return {url, ms, name};
}

/* Lecture age SP si dispo (avec credentials) */
async function readAgeSP(depot){
  try{
    const r = await fetch(cb(SP_AGE[depot]), {cache:'no-store', credentials:'include'});
    if(!r.ok) return {ms:null, why:'HTTP '+r.status};
    // robust: ne garder que les chiffres
    let s = (await r.text()).replace(/^\uFEFF/, '').trim().replace(/[^\d]/g,'');
    if(!s) return {ms:null, why:'parse'};
    let ms = Number(s);
    if(ms < 1e12) ms *= 1000;
    return {ms, why:null};
  }catch(e){ return {ms:null, why:'fetch'}; }
}

/* Charge l'image et signale si OK */
function showImage(src, sourceLabel){
  return new Promise(resolve=>{
    img.onload  = ()=>{ lastOk = Date.now(); stamp.textContent = `${sourceLabel} • ` + new Date().toLocaleString(); resolve(true); };
    img.onerror = ()=>{ stamp.textContent = `Image KO (${sourceLabel}) • ` + new Date().toLocaleString(); resolve(false); };
    img.src = cb(src);
  });
}

async function tick(force=false){
  let diag = `Depot: ${depot}\n`;

  // 1) On essaie de récupérer l’âge depuis SP (si connecté)
  let spAge = await readAgeSP(depot);
  let ageMs = spAge.ms; // peut être null
  if (ageMs !== null) {
    const d = Date.now() - ageMs;
    const dSec = Math.round(d/1000);
    diag += `age(SP) OK • Δ=${dSec}s → ${d >= STALE_MS ? 'STALE' : 'OK'}\n`;
    if (d >= STALE_MS){
      await showImage(ERR_IMG, "Erreur");
      note.textContent = diag + "→ Source: SP age • Motif: ancien (>5min)";
      return;
    }
  } else {
    diag += `age(SP) indisponible (${spAge.why})\n`;
  }

  // 2) Choisir la dernière image depuis le miroir GitHub (sans latest.json)
  let pick = null;
  try{
    pick = await pickLatestFromMirror(depot);
  }catch(e){
    diag += `mirror listing KO (${e.message})\n`;
  }

  if (pick){
    // si pas d’âge SP, on utilise l’horodatage du nom mirror
    if (ageMs === null && pick.ms !== null){
      const d = Date.now() - pick.ms;
      const dSec = Math.round(d/1000);
      diag += `age(mirror name) • Δ=${dSec}s → ${d >= STALE_MS ? 'STALE' : 'OK'}\n`;
      if (d >= STALE_MS){
        await showImage(ERR_IMG, "Erreur");
        note.textContent = diag + "→ Source: mirror • Motif: ancien (>5min)";
        return;
      }
    }
    const ok = await showImage(pick.url, "Mirror");
    if(!ok){
      // tentative avec SP direct (image) si connecté
      const spImg = spRaw(`live_${depot}.png`);
      const ok2 = await showImage(spImg, "SP direct");
      if(!ok2){
        await showImage(ERR_IMG, "Erreur");
        diag += "mirror KO + SP KO → Erreur\n";
      } else {
        diag += "mirror KO → SP direct OK\n";
      }
    } else {
      diag += `Source image: mirror (${pick.name})\n`;
    }
  } else {
    // aucun mirror → essai SP direct
    const spImg = spRaw(`live_${depot}.png`);
    const ok = await showImage(spImg, "SP direct");
    if(!ok){
      await showImage(ERR_IMG, "Erreur");
      diag += "mirror vide + SP KO → Erreur\n";
    } else {
      diag += "mirror vide → SP direct OK\n";
    }
  }

  note.textContent = diag.trim();
}

setInterval(()=>tick(false), REFRESH_MS);
tick(true);
</script>
</body>
</html>
