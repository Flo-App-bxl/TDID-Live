<!doctype html>
<html lang="fr">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>TDID Live – Brel / Delta / Erasm.</title>
<style>
  :root{--bg:#0f1115;--fg:#eaeef5;--card:#141923;--line:#1e2330;--accent:#1a5bff;--ok:#18c58f;--warn:#f2b636;--err:#ff4d4f}
  html,body{height:100%;margin:0;background:var(--bg);color:var(--fg);font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif}
  body{display:flex;flex-direction:column}
  .top{flex-shrink:0;height:64px;display:flex;gap:8px;align-items:center;padding:10px 12px;background:#12151bde;border-bottom:1px solid var(--line);backdrop-filter:blur(6px);z-index:10}
  .brand{font-weight:700;margin-right:8px}
  .btn{padding:8px 14px;border:1px solid var(--line);border-radius:12px;background:var(--card);color:var(--fg);cursor:pointer}
  .btn.active{background:var(--accent);color:#fff;border-color:transparent}
  .wrap{flex:1;display:flex;align-items:center;justify-content:center;overflow:hidden}
  img{max-width:100%;max-height:100%;object-fit:contain;display:block;margin:auto}
  .status{display:flex;align-items:center;gap:8px;margin-left:auto}
  .dot{width:10px;height:10px;border-radius:50%}
  .dot.ok{background:var(--ok)} .dot.warn{background:var(--warn)} .dot.err{background:var(--err)}
  .stamp{opacity:.9;font-size:.9em}
  .note{position:fixed;bottom:8px;left:50%;transform:translateX(-50%);opacity:.85;font-size:.85em;text-align:center;white-space:pre-line;max-width:92vw}

  /* Bandeau défilant centré (2x plus haut / texte plus grand) */
  .banner{
    position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);
    background:rgba(242,182,54,0.7);color:#000;padding:16px 24px;border-radius:14px;
    font-weight:700;font-size:1.4em;z-index:20;display:none;overflow:hidden;white-space:nowrap;width:80vw;text-align:center;
    box-shadow:0 0 14px rgba(0,0,0,0.4);
  }
  .banner span{display:inline-block;padding-left:100%;animation:scrollText 15s linear infinite;}
  @keyframes scrollText{0%{transform:translateX(0);}100%{transform:translateX(-100%);}}
</style>
</head>
<body>
  <div class="top">
    <span class="brand">TDID Live</span>
    <button class="btn" id="brel">Brel</button>
    <button class="btn" id="delta">Delta</button>
    <button class="btn" id="erasme">Erasm.</button>
    <div class="status">
      <span id="led" class="dot"></span>
      <span class="stamp" id="stamp">—</span>
    </div>
  </div>

  <div class="banner" id="banner">
    <span>Refresh + de 10min - contrôler fiabilité via cellule ‘Last Refresh’ • Refresh +10 min – controleer betrouwbaarheid via cel ‘Last Refresh’</span>
  </div>

  <div class="wrap"><img id="view" alt="TDID Live"></div>
  <div class="note" id="note"></div>

<script>
/* ========= GitHub ========= */
const GH_USER   = "Flo-App-bxl";
const GH_REPO   = "TDID-Live";
const GH_BRANCH = "main";
const GH_RAW    = `https://raw.githubusercontent.com/${GH_USER}/${GH_REPO}/${GH_BRANCH}`;
const GH_JSDELIVR = `https://cdn.jsdelivr.net/gh/${GH_USER}/${GH_REPO}@${GH_BRANCH}`;
const toJsDelivr = rawUrl => rawUrl.replace(GH_RAW, GH_JSDELIVR);

const MIRROR_DIR = { brel:"mirror_brel", delta:"mirror_delta", erasme:"mirror_erasme" };
const LATEST_PATH = {
  brel:   `time_brel/latest.json`,
  delta:  `time_delta/latest.json`,
  erasme: `time_erasme/latest.json`
};
const LATEST_URL = {
  brel:   `${GH_RAW}/${LATEST_PATH.brel}`,
  delta:  `${GH_RAW}/${LATEST_PATH.delta}`,
  erasme: `${GH_RAW}/${LATEST_PATH.erasme}`
};
const LATEST_URL_ALT = {
  brel:   `${GH_JSDELIVR}/${LATEST_PATH.brel}`,
  delta:  `${GH_JSDELIVR}/${LATEST_PATH.delta}`,
  erasme: `${GH_JSDELIVR}/${LATEST_PATH.erasme}`
};
const ERR_IMG = `${GH_RAW}/TDID_Erreur.png`;

/* ========= Timers / règles ========= */
const REFRESH_MS = 6000;            // UI 6 s
const STALE_MS   = 10*60*1000;      // 10 min
const JITTER_OK  = 5*1000;          // Δ<=5 s
const LATEST_MIN_INTERVAL = 60*1000;// 1 vrai fetch/min
const LOCAL_TTL_MS = 60*1000;       // fallback local max 60 s
const HORODATE_RE = /\/mirror_(brel|delta|erasme)\/.+\.(png|jpe?g|webp|bmp|gif)$/i;

const latestCache = { brel:null, delta:null, erasme:null }; // {data,fetchedAt,dataRaw,lastSource,lastDiag}
const etagMap = { brel:null, delta:null, erasme:null };
const lmMap   = { brel:null, delta:null, erasme:null };

/* ========= SharePoint ========= */
const SP_BASE   = "https://stibmivb-my.sharepoint.com/personal/florent_legrain_stib_brussels";
const SP_FOLDER = "/personal/florent_legrain_stib_brussels/Documents/LiveMirror";
const spRaw = f => `${SP_BASE}/_layouts/15/download.aspx?SourceUrl=${encodeURIComponent(SP_FOLDER + "/" + f)}`;
const DATA_SP = { brel:{img:spRaw("live_brel.png")}, delta:{img:spRaw("live_delta.png")}, erasme:{img:spRaw("live_erasme.png")} };

/* ========= UI refs ========= */
const img   = document.getElementById('view');
const stamp = document.getElementById('stamp');
const note  = document.getElementById('note');
const led   = document.getElementById('led');
const banner= document.getElementById('banner');
const btns  = { brel:document.getElementById('brel'), delta:document.getElementById('delta'), erasme:document.getElementById('erasme') };

let depot = localStorage.getItem('tdid_depot') || 'brel';
function setActive(){ for(const k in btns){ btns[k].classList.toggle('active', k===depot); } }
for(const k in btns){ btns[k].onclick = () => { depot=k; localStorage.setItem('tdid_depot', depot); setActive(); tick(true); }; }
setActive();

/* ========= helpers ========= */
const cb = u => u + (u.includes('?')?'&':'?') + 't=' + Date.now(); // tester existence images (pas pour affichage miroir exact)
const cbMinuteStrict = u => u + (u.includes('?')?'&':'?') + 'x_bypass=' + Math.floor(Date.now()/60000);

function setTop(status,label){ led.className='dot '+(status==='ok'?'ok':status==='warn'?'warn':'err'); stamp.textContent=`${label} • ${new Date().toLocaleString()}`; }
function saveLocal(key,val){ localStorage.setItem(key, JSON.stringify({...val, savedAt:Date.now()})); }
function readLocal(key){ try{ return JSON.parse(localStorage.getItem(key)||"null"); } catch{ return null; } }
function showBanner(show){ banner.style.display = show ? 'block' : 'none'; }
function isFresh(ts){ return (Date.now() - ts) <= LOCAL_TTL_MS; }

/* ========= réseau util ========= */
async function fetchWithTimeout(url,opt={},ms=8000){
  const ctrl=new AbortController(); const t=setTimeout(()=>ctrl.abort(),ms);
  try{ return await fetch(url,{...opt,signal:ctrl.signal}); }
  finally{ clearTimeout(t); }
}

/* ========= latest.json – essais & logs ========= */
async function fetchLatestJSON(primaryUrl, altUrl, key){
  const bypassPrimary = cbMinuteStrict(primaryUrl); // force 1 vrai hit/min
  const bypassAlt     = cbMinuteStrict(altUrl);

  const headersCommon = {
    'Cache-Control':'no-cache, no-store, must-revalidate',
    'Pragma':'no-cache',
    'Expires':'0'
  };

  let trace = [];

  // 1) RAW0 : no-store direct
  try{
    const r0 = await fetchWithTimeout(bypassPrimary, { cache:'no-store', headers: headersCommon }, 8000);
    trace.push(`RAW0:${r0.status}`);
    if (r0.ok){ return { json: await r0.json(), via:'raw0', diag: trace.join(' ') }; }
  }catch(e){ trace.push('RAW0→fallback'); }

  // 2) RAW : revalidation ETag/IMS
  try{
    const headers = {...headersCommon};
    if (etagMap[key]) headers['If-None-Match']=etagMap[key];
    if (lmMap[key])   headers['If-Modified-Since']=lmMap[key];
    const r = await fetchWithTimeout(bypassPrimary, { cache:'no-store', headers }, 8000);
    trace.push(`RAW:${r.status}`);
    if (r.status===304 && latestCache[key]?.data){
      return { json: latestCache[key].dataRaw, via:'raw304', diag: trace.join(' ') };
    }
    if (r.ok){
      const et=r.headers.get('ETag'); if (et) etagMap[key]=et;
      const lm=r.headers.get('Last-Modified'); if (lm) lmMap[key]=lm;
      return { json: await r.json(), via:'raw', diag: trace.join(' ') };
    }
  }catch(e){ trace.push('RAW→fallback'); }

  // 3) CDN jsDelivr
  try{
    const r2 = await fetchWithTimeout(bypassAlt, { cache:'no-store', headers: headersCommon }, 8000);
    trace.push(`CDN:${r2.status}`);
    if (r2.ok){ return { json: await r2.json(), via:'jsdelivr', diag: trace.join(' ') }; }
  }catch(e){ trace.push('CDN→fail'); }

  return { json:null, via:'none', diag: trace.join(' ') };
}

/* ========= lecture latest.json ========= */
function key(depot){ return `tdid_last_good_${depot}`; } // {ts,url,savedAt}
async function readLatestRaw(depotKey){
  const resp = await fetchLatestJSON(LATEST_URL[depotKey], LATEST_URL_ALT[depotKey], depotKey);
  if (!resp.json) throw new Error(resp.diag || 'Load failed');

  const j = resp.json;
  const it = j?.items?.[depotKey];
  if (!it?.ts) throw new Error('bad json');

  let imgUrl = it.url;
  if (!imgUrl){
    const f = (it.file||"").split('/').pop();
    if (!f) throw new Error('no file');
    imgUrl = `${GH_RAW}/${MIRROR_DIR[depotKey]}/${f}`;
  }
  if (!HORODATE_RE.test(imgUrl)) throw new Error('url not timestamped/mirror');

  const tsMs = Number(it.ts)*1000;
  if (!Number.isFinite(tsMs)) throw new Error('bad ts');

  latestCache[depotKey] = latestCache[depotKey] || {};
  latestCache[depotKey].dataRaw   = j;
  latestCache[depotKey].lastSource= resp.via;
  latestCache[depotKey].lastDiag  = resp.diag;

  return { ts: tsMs, url: imgUrl };
}

/* ========= images : preload + rendu exact (RAW → jsDelivr) ========= */
async function preloadWithFallback(src, withCred=false){
  const tryLoad = (url)=>new Promise(res=>{
    const t=new Image(); if(withCred) t.referrerPolicy='no-referrer-when-downgrade';
    t.onload=()=>res({ok:true,url}); t.onerror=()=>res({ok:false});
    t.src = cb(url);
  });
  const a = await tryLoad(src);
  if (a.ok) return {...a, via:'raw'};
  const alt = toJsDelivr(src);
  const b = await tryLoad(alt);
  if (b.ok) return {...b, via:'jsdelivr'};
  return {ok:false};
}
async function renderMirrorExact(src, statusLabel){
  const load = (url)=>new Promise(r=>{ const t=new Image(); t.onload=()=>r({ok:true,url}); t.onerror=()=>r({ok:false}); t.src=url; });
  let a = await load(src);
  if (a.ok){ img.src=a.url; setTop(statusLabel.status,statusLabel.text); return {ok:true,via:'raw'}; }
  const alt = toJsDelivr(src);
  let b = await load(alt);
  if (b.ok){ img.src=b.url; setTop(statusLabel.status,statusLabel.text); return {ok:true,via:'jsdelivr'}; }
  setTop('err',statusLabel.text+' KO'); return {ok:false};
}
function renderFrom(src,statusLabel){
  return new Promise(res=>{
    const l=new Image(); l.onload=()=>{img.src=l.src; setTop(statusLabel.status,statusLabel.text); res(true);};
    l.onerror=()=>{ setTop('err',statusLabel.text+' KO'); res(false); };
    l.src = cb(src);
  });
}

/* ========= throttle 1/min ========= */
async function readLatestThrottled(depotKey, force=false){
  const now=Date.now(), cache=latestCache[depotKey];
  if (!force && cache && cache.data && (now - cache.fetchedAt) < LATEST_MIN_INTERVAL) return cache.data;
  const data = await readLatestRaw(depotKey);
  latestCache[depotKey] = { ...(latestCache[depotKey]||{}), data, fetchedAt: now };
  return data;
}

/* ========= boucle ========= */
async function tick(force=false){
  try{
    showBanner(false); // reset bandeau à chaque cycle
    const sp = DATA_SP[depot];
    let diag = `Depot: ${depot}\n`;
    let latest = null;

    try{
      latest = await readLatestThrottled(depot, force);
    }catch(e){
      diag += `latest.json KO (${e.message})`;
    }

    // Fallback local strict <60s + URL horodatée
    const lastGood = readLocal(key(depot));
    if (!latest && lastGood){
      const fresh = lastGood.savedAt && isFresh(lastGood.savedAt);
      const goodUrl = typeof lastGood.url==='string' && HORODATE_RE.test(lastGood.url);
      if (fresh && goodUrl){ latest={ts:lastGood.ts,url:lastGood.url}; diag += `\n→ fallback local <60s`; }
    }

    if (!latest){
      await renderFrom(ERR_IMG,{status:'err',text:'Erreur'});
      note.textContent = diag + `\n→ Pas de données`;
      return;
    }

    // âge miroir
    const ageMs = Date.now() - latest.ts;
    const ageSec = Math.round(ageMs/1000);
    const tooOld = ageMs >= STALE_MS;

    // filtre Δ<=5 s silencieux
    const lg = readLocal(key(depot));
    if (lg && Math.abs(latest.ts - lg.ts) <= JITTER_OK){ latest = { ts: lg.ts, url: lg.url }; }

    if (latestCache[depot]?.lastSource) diag += `source latest: ${latestCache[depot].lastSource}\n`;
    if (latestCache[depot]?.lastDiag)   diag += `HTTP trace: ${latestCache[depot].lastDiag}\n`;
    diag += `age(miroir) • Δ=${ageSec}s → ${tooOld?'STALE':'OK'}`;

    if (tooOld){
      const spTry = await preloadWithFallback(sp.img, true);
      if (spTry.ok){
        await renderFrom(spTry.url, {status:'err', text:'SP (miroir ≥10min)'});
        note.textContent = diag + `\nsource: SP`;
        showBanner(true); // ON seulement si SP OK & âge>10 min
      } else {
        await renderFrom(ERR_IMG, {status:'err', text:'Erreur'});
        note.textContent = diag + `\n→ Erreur (miroir en retard & SP KO)`;
        showBanner(false);
      }
      return;
    }

    // latest frais → save
    saveLocal(key(depot), latest);

    // SP prioritaire si dispo
    const spOK = await preloadWithFallback(sp.img, true);
    if (spOK.ok){
      await renderFrom(spOK.url, {status:'ok', text:'SP'});
      note.textContent = diag + `\nsource: SP`;
      return;
    }

    // sinon miroir horodaté exact
    const mir = await renderMirrorExact(latest.url, {status:'warn', text:'Miroir (horodaté)'});
    if (mir.ok){
      note.textContent = diag + `\nsource: Miroir (${mir.via})`;
    } else {
      await renderFrom(ERR_IMG, {status:'err', text:'Erreur'});
      note.textContent = diag + `\n→ Erreur (miroir KO)`;
    }
  }catch(e){
    // filet de sécurité : on voit l’erreur JS si ça replante
    note.textContent = 'Fatal JS: ' + (e && e.message ? e.message : String(e));
    setTop('err','Erreur');
  }
}

/* ========= démarrage ========= */
const JITTER_START_MS = Math.floor(Math.random()*5000);
setTimeout(()=>{ tick(true); setInterval(()=>tick(false), REFRESH_MS); }, JITTER_START_MS);
window.addEventListener('visibilitychange', () => { if (!document.hidden) tick(true); });
window.addEventListener('focus', () => tick(true));
</script>
</body>
</html>
