<!doctype html>
<html lang="fr">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>TDID Live – Brel / Delta / Erasm.</title>
<style>
  :root{--bg:#0f1115;--fg:#eaeef5;--card:#141923;--line:#1e2330;--accent:#1a5bff;--ok:#18c58f;--warn:#f2b636;--err:#ff4d4f}
  html,body{height:100%;margin:0;background:var(--bg);color:var(--fg);font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif}
  body{display:flex;flex-direction:column}
  .top{flex-shrink:0;height:64px;display:flex;gap:8px;align-items:center;padding:10px 12px;background:#12151bde;border-bottom:1px solid var(--line);backdrop-filter:blur(6px);z-index:10}
  .brand{font-weight:700;margin-right:8px}
  .btn{padding:8px 14px;border:1px solid var(--line);border-radius:12px;background:var(--card);color:var(--fg);cursor:pointer}
  .btn.active{background:var(--accent);color:#fff;border-color:transparent}
  .wrap{flex:1;display:flex;align-items:center;justify-content:center;overflow:hidden}
  img{max-width:100%;max-height:100%;object-fit:contain;display:block;margin:auto}
  .status{display:flex;align-items:center;gap:8px;margin-left:auto}
  .dot{width:10px;height:10px;border-radius:50%}
  .dot.ok{background:var(--ok)} .dot.warn{background:var(--warn)} .dot.err{background:var(--err)}
  .stamp{opacity:.9;font-size:.9em}
  .note{position:fixed;bottom:8px;left:50%;transform:translateX(-50%);opacity:.85;font-size:.85em;text-align:center;white-space:pre-line;max-width:92vw}

  /* === Bandeau défilant centré (horizontal + vertical) === */
  .banner{
    position:fixed;
    top:50%;
    left:50%;
    transform:translate(-50%,-50%);
    background:rgba(242,182,54,0.7); /* var(--warn) à 70% opacité */
    color:#000;
    padding:8px 16px;
    border-radius:10px;
    font-weight:600;
    z-index:20;
    display:none;
    overflow:hidden;
    white-space:nowrap;
    width:80vw;
    text-align:center;
    box-shadow:0 0 12px rgba(0,0,0,0.4);
  }

  .banner span{
    display:inline-block;
    padding-left:100%;
    animation:scrollText 15s linear infinite;
  }

  @keyframes scrollText{
    0%{transform:translateX(0);}
    100%{transform:translateX(-100%);}
  }
</style>
</head>
<body>
  <div class="top">
    <span class="brand">TDID Live</span>
    <button class="btn" id="brel">Brel</button>
    <button class="btn" id="delta">Delta</button>
    <button class="btn" id="erasme">Erasm.</button>
    <div class="status">
      <span id="led" class="dot"></span>
      <span class="stamp" id="stamp">—</span>
    </div>
  </div>

  <!-- Bandeau FR + NL-BE (caché par défaut) -->
  <div class="banner" id="banner">
    <span>Refresh + de 10min - contrôler fiabilité via cellule ‘Last Refresh’ • Refresh +10 min – controleer betrouwbaarheid via cel ‘Last Refresh’</span>
  </div>

  <div class="wrap"><img id="view" alt="TDID Live"></div>
  <div class="note" id="note"></div>

<script>
const GH_USER   = "Flo-App-bxl";
const GH_REPO   = "TDID-Live";
const GH_BRANCH = "main";
const GH_RAW    = `https://raw.githubusercontent.com/${GH_USER}/${GH_REPO}/${GH_BRANCH}`;
const MIRROR_DIR = { brel:"mirror_brel", delta:"mirror_delta", erasme:"mirror_erasme" };
const LATEST_URL = {
  brel:   `${GH_RAW}/time_brel/latest.json`,
  delta:  `${GH_RAW}/time_delta/latest.json`,
  erasme: `${GH_RAW}/time_erasme/latest.json`
};
const ERR_IMG   = `${GH_RAW}/TDID_Erreur.png`;
const REFRESH_MS = 3000;
const STALE_MS   = 10*60*1000;
const JITTER_OK  = 5*1000;

const SP_BASE   = "https://stibmivb-my.sharepoint.com/personal/florent_legrain_stib_brussels";
const SP_FOLDER = "/personal/florent_legrain_stib_brussels/Documents/LiveMirror";
const spRaw = f => `${SP_BASE}/_layouts/15/download.aspx?SourceUrl=${encodeURIComponent(SP_FOLDER + "/" + f)}`;
const DATA_SP = {
  brel:   { img: spRaw("live_brel.png") },
  delta:  { img: spRaw("live_delta.png") },
  erasme: { img: spRaw("live_erasme.png") }
};

const img   = document.getElementById('view');
const stamp = document.getElementById('stamp');
const note  = document.getElementById('note');
const led   = document.getElementById('led');
const banner= document.getElementById('banner');
const btns  = { brel:document.getElementById('brel'), delta:document.getElementById('delta'), erasme:document.getElementById('erasme') };

let depot = localStorage.getItem('tdid_depot') || 'brel';
function setActive(){ for(const k in btns){ btns[k].classList.toggle('active', k===depot); } }
for(const k in btns){ btns[k].onclick = () => { depot=k; localStorage.setItem('tdid_depot', depot); setActive(); tick(true); }; }
setActive();

const cb = u => u + (u.includes('?')?'&':'?') + 't=' + Date.now();
function setTop(status, label){
  led.className = 'dot ' + (status==='ok'?'ok':status==='warn'?'warn':'err');
  stamp.textContent = `${label} • ${new Date().toLocaleString()}`;
}
function saveLocal(key, val){ localStorage.setItem(key, JSON.stringify(val)); }
function readLocal(key){ try{ return JSON.parse(localStorage.getItem(key)||"null"); } catch{ return null; } }
function showBanner(show){ banner.style.display = show ? 'block' : 'none'; }

function preload(src, withCred=false){
  return new Promise(res=>{
    const t = new Image();
    if (withCred) t.referrerPolicy = 'no-referrer-when-downgrade';
    t.onload  = ()=>res(true);
    t.onerror = ()=>res(false);
    t.src = cb(src);
  });
}
async function renderFrom(src, statusLabel){
  return new Promise(res=>{
    const loader = new Image();
    loader.onload = ()=>{ img.src = loader.src; setTop(statusLabel.status, statusLabel.text); res(true); };
    loader.onerror= ()=>{ setTop('err', statusLabel.text + ' KO'); res(false); };
    loader.src = cb(src);
  });
}

function key(depot){ return `tdid_last_good_${depot}`; }
async function readLatestRaw(depotKey){
  const url = cb(LATEST_URL[depotKey]);
  const r   = await fetch(url, {cache:'no-store'});
  if (!r.ok) throw new Error('HTTP '+r.status);
  const j = await r.json();
  const it = j?.items?.[depotKey];
  if (!it?.ts) throw new Error('bad json');
  let imgUrl = it.url;
  if (!imgUrl){
    const f = (it.file||"").split('/').pop();
    if (!f) throw new Error('no file');
    imgUrl = `${GH_RAW}/${MIRROR_DIR[depotKey]}/${f}`;
  }
  const tsMs = Number(it.ts)*1000;
  if (!Number.isFinite(tsMs)) throw new Error('bad ts');
  return { ts: tsMs, url: imgUrl };
}

async function tick(force=false){
  const sp = DATA_SP[depot];
  let diag = `Depot: ${depot}\n`;
  let latest = null;
  try{ latest = await readLatestRaw(depot); }
  catch(e){ diag += `latest.json RAW KO (${e.message})`; }
  const lastGood = readLocal(key(depot));
  if (!latest && lastGood){ latest = lastGood; diag += `\n→ fallback cache local`; }

  if (!latest){
    const okSP = await preload(sp.img, true);
    if (okSP){
      await renderFrom(sp.img, {status:'ok', text:'SP'});
      note.textContent = diag + `\nsource: SP (RAW indisponible)`;
      showBanner(false);
    } else {
      await renderFrom(ERR_IMG, {status:'err', text:'Erreur'});
      note.textContent = diag + `\n→ Erreur : pas de miroir et SP KO`;
      showBanner(false);
    }
    return;
  }

  const ageMs = Date.now() - latest.ts;
  const ageSec = Math.round(ageMs/1000);
  const tooOld = ageMs >= STALE_MS;

  if (lastGood && Math.abs(latest.ts - lastGood.ts) <= JITTER_OK){
    latest = lastGood; diag += `\nΔ<=5s → conserve la version précédente`;
  }

  diag += `age(miroir) • Δ=${ageSec}s → ${tooOld?'STALE':'OK'}`;

  if (tooOld){
    const okSP = await preload(sp.img, true);
    if (okSP){
      await renderFrom(sp.img, {status:'err', text:'SP (miroir ≥10min)'});
      note.textContent = diag + `\nsource: SP`;
      showBanner(true);
    } else {
      await renderFrom(ERR_IMG, {status:'err', text:'Erreur'});
      note.textContent = diag + `\n→ Erreur (miroir en retard & SP KO)`;
      showBanner(false);
    }
    return;
  }

  saveLocal(key(depot), latest);

  const spOK = await preload(sp.img, true);
  if (spOK){
    await renderFrom(sp.img, {status:'ok', text:'SP'});
    note.textContent = diag + `\nsource: SP`;
    showBanner(false);
    return;
  }

  const mirOK = await preload(latest.url);
  if (mirOK){
    await renderFrom(latest.url, {status:'warn', text:'Miroir'});
    note.textContent = diag + `\nsource: Miroir`;
  } else {
    await renderFrom(ERR_IMG, {status:'err', text:'Erreur'});
    note.textContent = diag + `\n→ Erreur (miroir & SP KO)`;
  }
  showBanner(false);
}

setInterval(()=>tick(false), REFRESH_MS);
tick(true);
</script>
</body>
</html>
