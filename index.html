<!doctype html>
<html lang="fr">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>TDID Live – SP prioritaire + Miroir 15 min + Plein écran mobile</title>
<style>
  :root{--bg:#0f1115;--fg:#eaeef5;--card:#141923;--line:#1e2330;--accent:#1a5bff;--ok:#18c58f;--warn:#f2b636;--err:#ff4d4f}
  html,body{height:100%;margin:0;background:var(--bg);color:var(--fg);font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif}
  body{display:flex;flex-direction:column}
  .top{flex-shrink:0;height:64px;display:flex;gap:8px;align-items:center;padding:10px 12px;background:#12151bde;border-bottom:1px solid var(--line)}
  .brand{font-weight:700;margin-right:8px}
  .btn{padding:8px 14px;border:1px solid var(--line);border-radius:12px;background:var(--card);color:var(--fg);cursor:pointer}
  .btn.active{background:var(--accent);color:#fff;border-color:transparent}
  .status{display:flex;align-items:center;gap:8px;margin-left:auto}
  .dot{width:10px;height:10px;border-radius:50%}
  .dot.ok{background:var(--ok)} .dot.warn{background:var(--warn)} .dot.err{background:var(--err)}
  .stamp{opacity:.9;font-size:.9em}
  .toggle{padding:6px 10px;border:1px solid var(--line);border-radius:10px;background:#1b2130;color:#fff;cursor:pointer;font-size:.85em;display:none}
  .toggle.active{background:#2a3347}
  .wrap{flex:1;display:flex;align-items:center;justify-content:center;overflow:hidden;position:relative}
  img{max-width:100%;max-height:100%;object-fit:contain;display:block;margin:auto}
  .note{position:fixed;bottom:8px;left:50%;transform:translateX(-50%);opacity:.85;font-size:.9em;text-align:center;white-space:pre-line;max-width:92vw}
  .banner{
    position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);
    background:rgba(242,182,54,0.7);color:#000;padding:24px 28px;border-radius:16px;
    font-weight:700;font-size:1.4em;z-index:20;display:none;overflow:hidden;white-space:nowrap;width:80vw;text-align:center;
  }
  .banner span{display:inline-block;padding-left:100%;animation:scrollText 15s linear infinite;}
  @keyframes scrollText{0%{transform:translateX(0);}100%{transform:translateX(-100%);}}

  /* Splash vidéo */
  .splash{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;background:#0f1115e0;z-index:30}
  .splash video{max-width:80vw;border-radius:10px}
  .splash .skip{position:absolute;bottom:20px;right:20px;padding:8px 14px;background:#1b2130;color:#fff;border:1px solid var(--line);border-radius:10px;cursor:pointer}

  /* Indication rotation mobile */
  .rotate{position:absolute;inset:0;display:none;align-items:center;justify-content:center;background:#0f1115cf;z-index:25}
  .rotate .box{padding:16px 20px;border:1px solid var(--line);border-radius:12px;background:#161a24;text-align:center}

  /* Bouton plein écran */
  .fsbtn{position:fixed;right:12px;top:72px;z-index:26;padding:8px 12px;border-radius:10px;border:1px solid var(--line);
    background:#141923;color:#fff;font-size:.9em;display:none;cursor:pointer;}

  @media (pointer:coarse){
    .top{height:52px;padding:8px}
    .btn{padding:6px 10px}
    .banner{font-size:1.1em}
  }
</style>
</head>
<body>
<div class="top">
  <span class="brand">TDID Live</span>
  <button class="btn" id="brel">Brel</button>
  <button class="btn" id="delta">Delta</button>
  <button class="btn" id="erasme">Erasm.</button>
  <div class="status">
    <button id="forceMirror" class="toggle">Miroir 15 min</button>
    <span id="led" class="dot"></span>
    <span id="stamp">—</span>
  </div>
</div>

<button id="fsbtn" class="fsbtn">🔳 Plein écran</button>

<div class="banner" id="banner">
  <span>Refresh &gt; 5 min – vérifier fiabilité via ‘Last Refresh’</span>
</div>

<div class="wrap">
  <div class="splash" id="splash">
    <video id="intro" autoplay muted playsinline preload="auto"
      src="https://raw.githubusercontent.com/Flo-App-bxl/TDID-Live/main/assets/intro.mp4"></video>
    <button class="skip" id="skipIntro">Passer</button>
  </div>

  <div class="rotate" id="rotateHint"><div class="box">📱 Tournez votre téléphone en mode paysage</div></div>
  <img id="view" alt="TDID Live" />
</div>
<div class="note" id="note"></div>

<script>
const GH_RAW="https://raw.githubusercontent.com/Flo-App-bxl/TDID-Live/main";
const GH_API="https://api.github.com/repos/Flo-App-bxl/TDID-Live/contents";
const JSDELIVR="https://cdn.jsdelivr.net/gh/Flo-App-bxl/TDID-Live@main";
const MIRROR_DIR={brel:"mirror_brel",delta:"mirror_delta",erasme:"mirror_erasme"};
const ERR_IMG=`${GH_RAW}/TDID_Erreur.png`;
const REFRESH_MS=6000, FETCH_MIN=60000, MIRROR_FORCE_MS=60000, BANNER_GT5=5*60000, MIRROR_ERR_10=10*60000, CACHE_MIRROR_TTL=60000;
const SP_BASE="https://stibmivb-my.sharepoint.com/personal/florent_legrain_stib_brussels";
const SP_FOLDER="/personal/florent_legrain_stib_brussels/Documents/LiveMirror";
const spRaw=f=>`${SP_BASE}/_layouts/15/download.aspx?SourceUrl=${encodeURIComponent(SP_FOLDER+"/"+f)}&t=${Date.now()}`;
const DATA_SP={brel:{img:spRaw("live_brel.png")},delta:{img:spRaw("live_delta.png")},erasme:{img:spRaw("live_erasme.png")}};

const img=document.getElementById('view'), note=document.getElementById('note'),
      led=document.getElementById('led'), stamp=document.getElementById('stamp'),
      banner=document.getElementById('banner'),
      intro=document.getElementById('intro'), splash=document.getElementById('splash'),
      skip=document.getElementById('skipIntro'), fsBtn=document.getElementById('fsbtn'),
      forceBtn=document.getElementById('forceMirror'),
      rotateHint=document.getElementById('rotateHint');

const btns={brel:document.getElementById('brel'),delta:document.getElementById('delta'),erasme:document.getElementById('erasme')};

let depot=localStorage.getItem('tdid_depot')||'brel';
function setActive(){for(const k in btns){btns[k].classList.toggle('active',k===depot);}}
for(const k in btns){btns[k].onclick=()=>{depot=k;localStorage.setItem('tdid_depot',k);forceFetch=true;setActive();tick();};}
setActive();

skip.onclick=()=>splash.style.display='none'; setTimeout(()=>splash.style.display='none',8000);

/* ==== Helpers ==== */
function setTop(status,label){led.className='dot '+(status==='ok'?'ok':status==='warn'?'warn':'err');stamp.textContent=`${label} • ${new Date().toLocaleTimeString()}`;}
function showBanner(show){banner.style.display=show?'block':'none';}
function renderFrom(src,label){return new Promise(res=>{const t=new Image();t.onload=()=>{img.src=t.src;setTop(label.status,label.text);res(true);};t.onerror=()=>res(false);t.src=src+"?t="+Date.now();});}
async function loadSp(k){try{const r=await fetch(DATA_SP[k].img,{cache:'no-store'});if(r.ok){const b=await r.blob();return{ok:true,url:URL.createObjectURL(b)};}}catch{}return{ok:false};}

async function fetchLatest(k,forceApi=false){
  const now=Date.now();
  if(!forceApi && !forceFetch && now-lastFetchAt[k]<FETCH_MIN && latest[k])return latest[k];
  let j=null;
  const path=`/time_${k}/latest.json`;
  for(const [u,tag] of [[`${GH_RAW}${path}`,'RAW'],[`${JSDELIVR}${path}`,'CDN'],[`${GH_API}${path}?ref=main`,'API']]){
    try{const r=await fetch(u,{cache:'no-store'});if(r.ok){j=await r.json();break;}}catch{}
  }
  if(!j)throw new Error('fetch failed');
  const it=j.items[k]; latest[k]={ts:+it.ts*1000,url:it.url||`${GH_RAW}/${MIRROR_DIR[k]}/${it.file}`};
  lastFetchAt[k]=now; return latest[k];
}

/* ==== États ==== */
let latest={brel:null,delta:null,erasme:null},lastFetchAt={brel:0,delta:0,erasme:0},
    lastMirror={brel:null,delta:null,erasme:null},forceFetch=true,bannerLatch={brel:false,delta:false,erasme:false},
    isMirror=false,mirrorTimer=null;
const OV_KEY='tdid_mirror_override_until';
function overrideActive(){const t=+localStorage.getItem(OV_KEY)||0;return Date.now()<t;}
function setOverride(min){localStorage.setItem(OV_KEY,Date.now()+min*60000);updateBtn(true);}
function clearOverride(){localStorage.removeItem(OV_KEY);updateBtn(false);}
function updateBtn(){const on=overrideActive();forceBtn.classList.toggle('active',on);
  forceBtn.textContent=on?"Miroir (forcé) ⏱ – Stop":"Miroir 15 min";
  forceBtn.style.display=(!isMirror)||on?'inline-block':'none';}
forceBtn.onclick=()=>{overrideActive()?clearOverride():setOverride(15);forceFetch=true;tick();};

function enterMirror(){if(!isMirror){isMirror=true;updateBtn();fetchLatest(depot,true).catch(()=>{});mirrorTimer=setInterval(()=>fetchLatest(depot,true),MIRROR_FORCE_MS);}}
function leaveMirror(){isMirror=false;updateBtn();clearInterval(mirrorTimer);}

/* Plein écran */
function isMobile(){return /Android|iPhone|iPad|Mobile/i.test(navigator.userAgent);}
function isLandscape(){return window.innerWidth>window.innerHeight;}
function canFS(){return document.documentElement.requestFullscreen;}
async function goFS(){try{await document.documentElement.requestFullscreen();}catch{}}
window.addEventListener('orientationchange',()=>{if(isMobile()&&isLandscape()&&canFS())goFS();});

/* ==== Tick ==== */
async function tick(){
  const k=depot; let diag=`Depot : ${k}\n`;
  const over=overrideActive();
  if(!over){
    const sp=await loadSp(k);
    if(sp.ok){
      leaveMirror();
      await renderFrom(sp.url,{status:'ok',text:'SP'});
      try{
        const l=await fetchLatest(k);const age=Date.now()-l.ts;
        if(age>BANNER_GT5)bannerLatch[k]=true;else bannerLatch[k]=false;
        showBanner(bannerLatch[k]);
        note.textContent=`Mode SP\nÂge miroir ${Math.round(age/1000)} s`;
      }catch{showBanner(bannerLatch[k]);note.textContent="Mode SP (latest KO)";}
      return;
    }else diag+="SP KO → miroir\n";
  }else diag+="Miroir forcé 15 min\n";

  enterMirror();
  let l=null;
  try{l=await fetchLatest(k,true);}catch{await renderFrom(ERR_IMG,{status:'err',text:'Erreur'});return;}
  const age=Date.now()-l.ts;
  if(age>MIRROR_ERR_10){await renderFrom(ERR_IMG,{status:'err',text:'Erreur >10 min'});return;}
  await renderFrom(l.url,{status:'warn',text:'Miroir'});showBanner(false);
  note.textContent=`Mode Miroir – ${Math.round(age/1000)} s`;
}

/* ==== Start ==== */
setInterval(()=>{updateBtn();tick();},REFRESH_MS);
tick();
</script>
</body>
</html>
