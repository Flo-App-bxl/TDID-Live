<!doctype html>
<html lang="fr">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>TDID – Train and Departure Information for Driver</title>

<link rel="icon" type="image/jpeg" href="https://raw.githubusercontent.com/Flo-App-bxl/TDID-Live/main/assets/intro_poster.jpg">
<link rel="apple-touch-icon" href="https://raw.githubusercontent.com/Flo-App-bxl/TDID-Live/main/assets/intro_poster.jpg">
<meta name="theme-color" content="#0f1115" />

<style>
  :root{--bg:#0f1115;--fg:#eaeef5;--card:#141923;--line:#1e2330;--accent:#1a5bff;--ok:#18c58f;--warn:#f2b636;--err:#ff4d4f}
  html,body{height:100%;margin:0;background:var(--bg);color:var(--fg);font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif}
  body{display:flex;flex-direction:column}

  .top{flex-shrink:0;height:64px;display:flex;gap:8px;align-items:center;padding:10px 12px;background:#12151bde;border-bottom:1px solid var(--line);z-index:5}
  .brand{font-weight:700;margin-right:8px}
  .btn{padding:8px 14px;border:1px solid var(--line);border-radius:12px;background:#141923;color:var(--fg);cursor:pointer}
  .btn.active{background:var(--accent);color:#fff;border-color:transparent}
  .status{display:flex;align-items:center;gap:8px;margin-left:auto}
  .dot{width:10px;height:10px;border-radius:50%}
  .dot.ok{background:var(--ok)} .dot.warn{background:var(--warn)} .dot.err{background:var(--err)}
  .stamp{opacity:.9;font-size:.9em}
  .toggle{padding:6px 10px;border:1px solid var(--line);border-radius:10px;background:#1b2130;color:#fff;cursor:pointer;font-size:.85em;display:none}
  .toggle.active{background:#2a3347}

  .wrap{flex:1;display:flex;align-items:center;justify-content:center;position:relative;height:100svh;overflow:auto;}
  .wrap::-webkit-scrollbar{display:none}
  img{max-width:100%;max-height:100%;object-fit:contain;display:block;margin:auto}

  .note{position:fixed;bottom:6px;left:50%;transform:translateX(-50%);opacity:.9;font-size:.85em;text-align:center;white-space:nowrap;max-width:96vw;overflow:hidden;text-overflow:ellipsis;z-index:6}

  .banner{position:fixed;top:75%;left:50%;transform:translate(-50%,-50%);background:rgba(242,182,54,0.75);color:#000;
    padding:26px 32px;border-radius:18px;font-weight:700;font-size:1.5em;z-index:20;display:none;overflow:hidden;white-space:nowrap;width:85vw;text-align:center;
    box-shadow:0 4px 16px rgba(0,0,0,0.3);}
  .banner span{display:inline-block;padding-left:100%;animation:scrollText 15s linear infinite;}
  @keyframes scrollText{0%{transform:translateX(0);}100%{transform:translateX(-100%);}}

  .fsbtn{position:fixed;right:12px;top:72px;z-index:26;padding:8px 12px;border-radius:10px;border:1px solid var(--line);
    background:#141923;color:#fff;font-size:.9em;display:none;cursor:pointer;}

  /* Overlay mode nuit */
  .night-overlay{position:absolute;inset:0;background:rgba(5,6,10,0.94);display:none;z-index:50;flex-direction:column;align-items:center;justify-content:flex-start;
    padding-top:15vh;padding-inline:4vw;color:#eaeef5;text-align:center;}
  .night-logo{width:220px;max-width:60vw;margin-bottom:20px;}
  #nightLine1{font-size:2.7em;font-weight:700;margin:8px 0;}
  #nightLine2{font-size:2.1em;margin:6px 0;}
</style>
</head>

<body>
  <div class="top" id="topbar">
    <span class="brand">TDID Live</span>
    <button class="btn" id="brel">Brel</button>
    <button class="btn" id="delta">Delta</button>
    <button class="btn" id="erasme">Erasm.</button>
    <div class="status">
      <button id="forceMirror" class="toggle">Miroir 15 min</button>
      <span id="led" class="dot"></span>
      <span id="stamp">—</span>
    </div>
  </div>

  <button id="fsbtn" class="fsbtn">🔳 Plein écran</button>

  <div class="banner" id="banner">
    <span>Refresh &gt; 5 min – vérifier fiabilité via ‘Last Refresh’ • Refresh &gt; 5 min – controleer betrouwbaarheid via ‘Last Refresh’</span>
  </div>

  <div class="wrap">
    <img id="view" alt="TDID Live" />
    <div class="night-overlay" id="nightOverlay">
      <img src="https://raw.githubusercontent.com/Flo-App-bxl/TDID-Live/main/assets/intro_poster.jpg" class="night-logo" alt="TDID logo">
      <div id="nightLine1">Made Night 🌙</div>
      <div id="nightLine2">Bonne nuit</div>
    </div>
  </div>
  <div class="note" id="note"></div>

<script>
/* ======== CONFIG GÉNÉRALE ======== */
const GH_USER="Flo-App-bxl", GH_REPO="TDID-Live", GH_BRANCH="main";
const GH_RAW=`https://raw.githubusercontent.com/${GH_USER}/${GH_REPO}/${GH_BRANCH}`;
const JSDELIVR=`https://cdn.jsdelivr.net/gh/${GH_USER}/${GH_REPO}@${GH_BRANCH}`;
const TDID_NIGHT_IMG=`${GH_RAW}/TDID_Night.png`;

const NIGHT_MIN_AGE=600000, NIGHT_OFF_AGE=300000; // 10min / 5min
const NIGHT_START=60, NIGHT_END=225; // 01h00–03h45

/* lecture du paramètre test */
const params=new URLSearchParams(location.search);
const forceNight=params.get('night');

/* Détection mode nuit */
function isNightWindow(){
  if(forceNight==="1") return true;
  if(forceNight==="0") return false;
  const d=new Date(),h=d.getHours(),m=d.getMinutes();
  const total=h*60+m;
  return total>=NIGHT_START && total<NIGHT_END;
}

/* DOM refs */
const img=document.getElementById('view'),
      note=document.getElementById('note'),
      led=document.getElementById('led'),
      stamp=document.getElementById('stamp'),
      banner=document.getElementById('banner'),
      nightOverlay=document.getElementById('nightOverlay'),
      nightLine1=document.getElementById('nightLine1'),
      nightLine2=document.getElementById('nightLine2');

let nightShown=false, nightTimer=null;

/* MàJ témoin */
function setTop(status,label){
  const night=isNightWindow();
  if(night){led.textContent='🌙';led.className='';stamp.textContent=`Night • ${new Date().toLocaleTimeString()}`;}
  else{led.textContent='';led.className='dot '+(status==='ok'?'ok':status==='warn'?'warn':'err');stamp.textContent=`${label} • ${new Date().toLocaleTimeString()}`;}
}
function showBanner(show){if(isNightWindow()) banner.style.display='none'; else banner.style.display=show?'block':'none';}
function dbg(parts){note.textContent=parts.filter(Boolean).join(' | ');}

/* Simule récupération latest (mock) */
async function fetchLatest(){
  const now=Date.now();
  const urls=[
    {u:`${GH_RAW}/time_brel/latest.json?x=${Math.floor(now/60000)}`,tag:'RAW'},
    {u:`${JSDELIVR}/time_brel/latest.json?x=${Math.floor(now/60000)}`,tag:'CDN'}
  ];
  let trace=[],source='-';
  async function tryJson(u,t){try{const r=await fetch(u,{cache:'no-store'});trace.push(`${t}:${r.status}`);if(!r.ok)return null;source=t;return await r.json();}catch{return null;}}
  let j=null;for(const {u,tag} of urls){j=await tryJson(u,tag);if(j)break;}
  if(!j) throw new Error('fetch failed');
  const it=j?.items?.brel;return {ts:Number(it.ts)*1000,url:it.url,source};
}

/* Mode nuit */
async function handleNight(){
  const inNight=isNightWindow();
  if(!inNight){nightOverlay.style.display='none';nightShown=false;clearInterval(nightTimer);return;}
  showBanner(false);
  await renderFrom(TDID_NIGHT_IMG,'Night');
  let L=null,ageMs=Infinity;
  try{L=await fetchLatest();if(L)ageMs=Date.now()-L.ts;}catch{}
  if(ageMs>=NIGHT_MIN_AGE && !nightShown){
    nightOverlay.style.display='flex';
    let toggle=false;
    nightLine1.textContent="Made Night 🌙";
    nightLine2.textContent="Bonne nuit";
    nightTimer=setInterval(()=>{toggle=!toggle;nightLine2.textContent=toggle?"Bonne nuit":"Goede nacht";},5000);
    nightShown=true;
  } else if(ageMs<NIGHT_OFF_AGE && nightShown){
    nightOverlay.style.display='none';nightShown=false;clearInterval(nightTimer);
  }
}

/* Affiche une image */
function renderFrom(src,label){return new Promise(res=>{const i=new Image();i.onload=()=>{img.src=i.src;setTop('ok',label);res(true)};i.onerror=()=>res(false);i.src=src;} );}

/* Tick principal */
async function tick(){
  const night=isNightWindow();
  if(night){await handleNight();return;}
  try{
    const L=await fetchLatest();
    await renderFrom(L.url,'Live');
    dbg([`mode:DAY`,`source:${L.source}`]);
  }catch{await renderFrom(TDID_NIGHT_IMG,'Erreur');}
}

/* Boucle */
(async()=>{await tick();setInterval(()=>tick(),6000);})();
</script>
</body>
</html>
