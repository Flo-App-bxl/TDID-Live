<!doctype html>
<html lang="fr">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>TDID Live – Brel / Delta / Erasm.</title>
<style>
  :root{--bg:#0f1115;--fg:#eaeef5;--card:#141923;--line:#1e2330;--accent:#1a5bff;--ok:#18c58f;--warn:#f2b636;--err:#ff4d4f}
  html,body{height:100%;margin:0;background:var(--bg);color:var(--fg);font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif}
  body{display:flex;flex-direction:column}
  .top{flex-shrink:0;height:64px;display:flex;gap:8px;align-items:center;padding:10px 12px;background:#12151bde;border-bottom:1px solid var(--line)}
  .brand{font-weight:700;margin-right:8px}
  .btn{padding:8px 14px;border:1px solid var(--line);border-radius:12px;background:var(--card);color:var(--fg);cursor:pointer}
  .btn.active{background:var(--accent);color:#fff;border-color:transparent}
  .status{display:flex;align-items:center;gap:8px;margin-left:auto}
  .dot{width:10px;height:10px;border-radius:50%}
  .dot.ok{background:var(--ok)} .dot.warn{background:var(--warn)} .dot.err{background:var(--err)}
  .stamp{opacity:.9;font-size:.9em}
  .wrap{flex:1;display:flex;align-items:center;justify-content:center;overflow:hidden;position:relative}
  img{max-width:100%;max-height:100%;object-fit:contain;display:block;margin:auto}

  .note{position:fixed;bottom:8px;left:50%;transform:translateX(-50%);opacity:.85;font-size:.9em;text-align:center;white-space:pre-line;max-width:92vw}

  /* Bandeau centre 70% opacité, texte défilant */
  .banner{
    position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);
    background:rgba(242,182,54,0.7);color:#000;padding:16px 24px;border-radius:14px;
    font-weight:700;font-size:1.4em;z-index:20;display:none;overflow:hidden;white-space:nowrap;width:80vw;text-align:center;
    box-shadow:0 0 14px rgba(0,0,0,0.4);
  }
  .banner span{display:inline-block;padding-left:100%;animation:scrollText 15s linear infinite;}
  @keyframes scrollText{0%{transform:translateX(0);}100%{transform:translateX(-100%);}}

  /* Splash vidéo (bloque l'affichage jusqu'à la fin) */
  .splash{
    position:absolute; inset:0; display:flex; align-items:center; justify-content:center;
    background:rgba(20,25,35,.9); z-index:30; backdrop-filter: blur(4px);
  }
  .splash-video{ position:relative; width:min(900px,92vw); aspect-ratio:16/9; }
  .splash-video video, .splash-video .fallback {
    position:absolute; inset:0; width:100%; height:100%; object-fit:cover; border-radius:12px;
  }
  .splash-video .fallback{
    display:flex; align-items:center; justify-content:center; font-weight:600; line-height:1.35;
    background:#0f1115; border:1px solid var(--line); color:#eaeef5;
  }
  .splash-video .skip{
    position:absolute; right:10px; bottom:10px; z-index:2;
    padding:8px 12px; border:1px solid var(--line); border-radius:10px; background:#141923; color:#fff; cursor:pointer; opacity:.9;
  }
</style>
</head>
<body>
  <div class="top">
    <span class="brand">TDID Live</span>
    <button class="btn" id="brel">Brel</button>
    <button class="btn" id="delta">Delta</button>
    <button class="btn" id="erasme">Erasm.</button>
    <div class="status">
      <span id="led" class="dot"></span>
      <span class="stamp" id="stamp">—</span>
    </div>
  </div>

  <!-- Bandeau FR + NL-BE -->
  <div class="banner" id="banner">
    <span>Refresh + de 10min - contrôler fiabilité via cellule ‘Last Refresh’ • Refresh +10 min – controleer betrouwbaarheid via cel ‘Last Refresh’</span>
  </div>

  <div class="wrap">
    <!-- Splash vidéo au démarrage -->
    <div class="splash" id="splash">
      <div class="splash-video">
        <video id="splashVideo"
               muted playsinline autoplay preload="auto"
               poster="https://raw.githubusercontent.com/Flo-App-bxl/TDID-Live/main/assets/intro_poster.jpg">
          <source src="https://raw.githubusercontent.com/Flo-App-bxl/TDID-Live/main/assets/intro.mp4" type="video/mp4">
        </video>
        <button id="skipIntro" class="skip">Passer • Overslaan</button>
        <div class="fallback">
          Veuillez patienter : démarrage en cours…<br/>Gelieve te wachten: opstart bezig…
        </div>
      </div>
    </div>

    <img id="view" alt="TDID Live">
  </div>

  <div class="note" id="note"></div>

<script>
const GH_RAW="https://raw.githubusercontent.com/Flo-App-bxl/TDID-Live/main";
const ERR_IMG=`${GH_RAW}/TDID_Erreur.png`;
const MIRROR_DIR={brel:"mirror_brel",delta:"mirror_delta",erasme:"mirror_erasme"};
const REFRESH_MS=6000, FETCH_MIN=60000, STALE_MS=10*60*1000, CACHE_MIRROR_TTL=60000;
const SP_BASE="https://stibmivb-my.sharepoint.com/personal/florent_legrain_stib_brussels";
const SP_FOLDER="/personal/florent_legrain_stib_brussels/Documents/LiveMirror";

/* anti-cache SP */
function spFresh(file){const t=Date.now();const enc=encodeURIComponent(`${SP_FOLDER}/${file}?v=${t}`);return `${SP_BASE}/_layouts/15/download.aspx?SourceUrl=${enc}&t=${t}`;}
function spUrlFor(k){return k==='brel'?spFresh('live_brel.png'):k==='delta'?spFresh('live_delta.png'):spFresh('live_erasme.png');}

/* Elements */
const img=document.getElementById('view'),note=document.getElementById('note'),led=document.getElementById('led'),
stamp=document.getElementById('stamp'),banner=document.getElementById('banner'),
splash=document.getElementById('splash'),vid=document.getElementById('splashVideo'),
skip=document.getElementById('skipIntro'),
btns={brel:document.getElementById('brel'),delta:document.getElementById('delta'),erasme:document.getElementById('erasme')};
let depot=localStorage.getItem('tdid_depot')||'brel';function setActive(){for(const k in btns){btns[k].classList.toggle('active',k===depot);}}
for(const k in btns){btns[k].onclick=()=>{depot=k;localStorage.setItem('tdid_depot',depot);setActive();forceFetch=true;tick();};}setActive();

/* Splash */
let splashActive=true;function showSplash(o){splash.style.display=o?'flex':'none';splashActive=o;}
function endSplash(r){if(!splashActive)return;showSplash(false);try{vid.pause();}catch{};note.textContent=(note.textContent?note.textContent+'\n':'')+`splash end:${r}`;}
if(vid){vid.play().catch(()=>{});vid.addEventListener('playing',()=>{const fb=splash.querySelector('.fallback');if(fb)fb.style.display='none';});
vid.addEventListener('ended',()=>endSplash('ended'));}
if(skip)skip.onclick=()=>endSplash('skip');
setTimeout(()=>endSplash('timeout'),10000);

/* Helpers */
function showBanner(on){banner.style.display=on?'block':'none';}
function setTop(s,l){led.className='dot '+(s==='ok'?'ok':s==='warn'?'warn':'err');stamp.textContent=`${l} • ${new Date().toLocaleString()}`;}
function preload(src){return new Promise(r=>{const i=new Image();i.onload=()=>r(true);i.onerror=()=>r(false);i.src=src+(src.includes('?')?'&':'?')+'t='+Date.now();});}

/* renderFrom — ajout bypass SP */
function renderFrom(src,statusLabel,exact=false){
  return new Promise(res=>{
    const t=new Image();
    t.onload=()=>{
      let clean=src;
      if(src.includes('sharepoint.com')) clean=src+(src.includes('?')?'&':'?')+'bypass='+Date.now();
      else if(!exact) clean=src+(src.includes('?')?'&':'?')+'t='+Date.now();
      img.src=clean;
      setTop(statusLabel.status,statusLabel.text);
      endSplash('first-frame');
      res(true);
    };
    t.onerror=()=>{setTop('err',statusLabel.text+' KO');res(false);};
    t.src=src+(src.includes('?')?'&':'?')+'check='+Date.now();
  });
}

/* Latest fetch */
let latestCache={},lastFetchAt={},forceFetch=true;
for(const k of ['brel','delta','erasme']){latestCache[k]=null;lastFetchAt[k]=0;}
async function fetchLatest(k){
  const now=Date.now();if(!forceFetch&&now-lastFetchAt[k]<FETCH_MIN&&latestCache[k])return latestCache[k];
  const path=k==='brel'?'/time_brel/latest.json':k==='delta'?'/time_delta/latest.json':'/time_erasme/latest.json';
  const url=`${GH_RAW}${path}?t=${now}`;lastFetchAt[k]=now;
  const r=await fetch(url,{cache:'no-store'});if(!r.ok)throw new Error('HTTP '+r.status);
  const j=await r.json();const it=j?.items?.[k];if(!it?.ts)throw new Error('bad json');
  let imgUrl=it.url;if(!imgUrl){const f=(it.file||'').split('/').pop();if(!f)throw new Error('no file');imgUrl=`${GH_RAW}/${MIRROR_DIR[k]}/${f}`;}
  latestCache[k]={ts:Number(it.ts)*1000,url:imgUrl};forceFetch=false;return latestCache[k];
}

/* Tick */
let lastMirror={};
async function tick(){
  const k=depot;let diag=`Depot:${k}\n`;
  let latest;try{latest=await fetchLatest(k);}catch(e){await renderFrom(ERR_IMG,{status:'err',text:'Erreur'});note.textContent=`${diag}${e.message}`;return;}
  const age=Date.now()-latest.ts;const tooOld=age>STALE_MS;
  // SP test
  const spUrl=spUrlFor(k);const spOK=await preload(spUrl,true);
  if(spOK){
    await renderFrom(spUrl,{status:tooOld?'err':'ok',text:'SP'});
    showBanner(tooOld);
    note.textContent=`${diag}SP OK Δ=${Math.round(age/1000)}s ${tooOld?'STALE':'OK'}`;return;
  }
  if(tooOld){await renderFrom(ERR_IMG,{status:'err',text:'Erreur (données >10min)'});note.textContent=`${diag}SP KO & stale`;return;}
  const mirOK=await renderFrom(latest.url,{status:'warn',text:'Miroir'},true);
  if(mirOK){lastMirror[k]={url:latest.url,time:Date.now()};note.textContent=`${diag}Miroir OK`;return;}
  const cached=lastMirror[k];if(cached&&Date.now()-cached.time<=CACHE_MIRROR_TTL){await renderFrom(cached.url,{status:'warn',text:'Cache'},true);note.textContent=`${diag}Cache ≤60s`;return;}
  await renderFrom(ERR_IMG,{status:'err',text:'Erreur'});note.textContent=`${diag}Tout KO`;
}

/* Start */
setInterval(tick,REFRESH_MS);tick();
</script>
</body>
</html>
