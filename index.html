<!doctype html>
<html lang="fr">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>TDID Live – Brel / Delta / Erasm.</title>
<style>
  :root{--bg:#0f1115;--fg:#eaeef5;--card:#141923;--line:#1e2330;--accent:#1a5bff}
  html,body{height:100%;margin:0;background:var(--bg);color:var(--fg);font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif}
  body{padding-top:64px}
  .top{position:fixed;top:0;left:0;right:0;height:64px;display:flex;gap:8px;align-items:center;padding:10px 12px;background:#12151bde;border-bottom:1px solid var(--line);backdrop-filter:blur(6px);z-index:10}
  .brand{font-weight:700;margin-right:8px}
  .btn{padding:8px 14px;border:1px solid var(--line);border-radius:12px;background:var(--card);color:var(--fg);cursor:pointer}
  .btn.active{background:var(--accent);color:#fff;border-color:transparent}
  .wrap{height:calc(100vh - 64px);display:flex;align-items:center;justify-content:center}
  img{max-width:100%;max-height:100%;object-fit:contain}
  .stamp{margin-left:auto;opacity:.95;font-size:.9em;display:flex;align-items:center;gap:.5rem}
  .light{width:.7rem;height:.7rem;border-radius:50%;display:inline-block;box-shadow:0 0 0 2px #0003 inset, 0 0 6px 1px #0005}
  .g{background:#22c55e;box-shadow:0 0 0 2px #0003 inset, 0 0 10px 2px #22c55e}
  .y{background:#eab308;box-shadow:0 0 0 2px #0003 inset, 0 0 10px 2px #eab308}
  .r{background:#ef4444;box-shadow:0 0 0 2px #0003 inset, 0 0 10px 2px #ef4444}
  .note{position:fixed;bottom:8px;left:50%;transform:translateX(-50%);opacity:.9;font-size:.85em;text-align:center;white-space:pre-line;max-width:92vw}
</style>
</head>
<body>
  <div class="top">
    <span class="brand">TDID Live</span>
    <button class="btn" id="brel">Brel</button>
    <button class="btn" id="delta">Delta</button>
    <button class="btn" id="erasme">Erasm.</button>
    <span class="stamp"><span id="led" class="light r"></span><span id="stamp">—</span></span>
  </div>

  <div class="wrap"><img id="view" alt="TDID Live"></div>
  <div class="note" id="note"></div>

<script>
/* ====== CONFIG ====== */
/* SP (OneDrive Pro) */
const SP_BASE   = "https://stibmivb-my.sharepoint.com/personal/florent_legrain_stib_brussels";
const SP_FOLDER = "/personal/florent_legrain_stib_brussels/Documents/LiveMirror";
const spRaw = f => `${SP_BASE}/_layouts/15/download.aspx?SourceUrl=${encodeURIComponent(SP_FOLDER + "/" + f)}`;

/* Miroir Pages : latest.json généré par PS1 */
const MIRROR_LATEST = "https://flo-app-bxl.github.io/TDID-Live/time/latest.json";

/* Image d’erreur (sur main/) */
const ERR_IMG_MAIN = "https://raw.githubusercontent.com/Flo-App-bxl/TDID-Live/main/TDID_Erreur.png";

/* Dépôts */
const DATA = {
  brel:   { spImg: spRaw("live_brel.png"),   mirrorKey: "brel"  },
  delta:  { spImg: spRaw("live_delta.png"),  mirrorKey: "delta" },
  erasme: { spImg: spRaw("live_erasme.png"), mirrorKey: "eras"  }
};

/* Rafraîchissement & seuil (5 min) */
const REFRESH_MS = 3000;
const STALE_MS   = 5 * 60 * 1000;

/* ====== UI refs ====== */
const img   = document.getElementById('view');
const stamp = document.getElementById('stamp');
const led   = document.getElementById('led');
const note  = document.getElementById('note');
const btns  = { brel:document.getElementById('brel'), delta:document.getElementById('delta'), erasme:document.getElementById('erasme') };

let depot = localStorage.getItem('tdid_depot') || 'brel';
function setActive(){ for(const k in btns){ btns[k].classList.toggle('active', k===depot); } }
for(const k in btns){ btns[k].onclick = () => { depot=k; localStorage.setItem('tdid_depot', depot); setActive(); tick(true); }; }
setActive();

/* ====== Utils ====== */
const cb = u => u + (u.includes('?')?'&':'?') + 't=' + Date.now();
function setLed(c){ led.className = "light " + c; }
function setStamp(s){ stamp.textContent = `${s} • ${new Date().toLocaleString()}`; }

async function readLatestJSON(){
  try{
    const r = await fetch(cb(MIRROR_LATEST), {cache:'no-store'});
    if (!r.ok) return {ok:false, why:'HTTP '+r.status};
    const j = await r.json();
    return {ok:true, data:j};
  }catch(e){ return {ok:false, why:'fetch'}; }
}

function show(src, label, color){
  return new Promise(res=>{
    img.onload  = ()=>{ setLed(color); setStamp(label); res(true); };
    img.onerror = ()=>{ setLed('r');      setStamp(label+' KO'); res(false); };
    img.src = cb(src);
  });
}

/* ====== Logique demandée ======
   1) Lire MIRROR latest.json
      - si age miroir > 5 min => ERREUR (peu importe SP)
      - si latest indispo => on affiche SP (sans garde-fou)
      - si age miroir ≤ 5 min => afficher SP (prioritaire), sinon miroir
*/
async function tick(force=false){
  const cfg = DATA[depot];
  let diag = `Depot: ${depot}\n`;

  // 1) Miroir d’abord
  const latest = await readLatestJSON();
  if (!latest.ok || !latest.data?.items?.[cfg.mirrorKey]){
    // Pas de garde-fou dispo → on montre SP quand même
    diag += `latest.json indisponible (${latest.why ?? 'inconnu'}) → SP sans contrôle d’âge miroir`;
    const okSp = await show(cfg.spImg, "SP", "g");
    if (okSp){
      note.textContent = diag + "\nsource: SP";
    } else {
      await show(ERR_IMG_MAIN, "Erreur (SP KO & miroir indispo)", "r");
      note.textContent = diag + "\n→ Erreur (origine : miroir indispo + image SP KO)";
    }
    return;
  }

  const it = latest.data.items[cfg.mirrorKey]; // { url, ts, file? }
  const tsMs   = Number(it.ts) * 1000;
  const deltaM = Date.now() - tsMs;
  const dSecM  = Math.round(deltaM/1000);
  const staleM = deltaM >= STALE_MS;
  diag += `age(miroir) • Δ=${dSecM}s → ${staleM ? 'STALE' : 'OK'}`;

  if (staleM){
    // Garde-fou : miroir en retard → erreur systématique
    await show(ERR_IMG_MAIN, "Erreur (miroir ≥5 min)", "r");
    note.textContent = diag + "\n→ Erreur (origine : miroir en retard ≥ 5 min)";
    return;
  }

  // 2) Miroir frais → SP prioritaire
  const okSp = await show(cfg.spImg, "SP", "g");
  if (okSp){
    note.textContent = diag + "\nsource: SP (miroir frais)";
    return;
  }

  // 3) SP KO → bascule miroir
  diag += "\nSP image KO → bascule miroir";
  const okMir = await show(it.url, "Miroir", "y");
  if (okMir){
    note.textContent = diag + "\nsource: Miroir";
  } else {
    await show(ERR_IMG_MAIN, "Erreur (miroir KO)", "r");
    note.textContent = diag + "\n→ Erreur (origine : image miroir KO)";
  }
}

setInterval(()=>tick(false), REFRESH_MS);
tick(true);
</script>
</body>
</html>
