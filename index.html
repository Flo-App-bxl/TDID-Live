<!doctype html>
<html lang="fr">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>TDID Live – Brel / Delta / Erasm.</title>
<style>
  :root{--bg:#0f1115;--fg:#eaeef5;--card:#141923;--line:#1e2330;--accent:#1a5bff}
  html,body{height:100%;margin:0;background:var(--bg);color:var(--fg);font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif}
  body{padding-top:64px}
  .top{position:fixed;top:0;left:0;right:0;height:64px;display:flex;gap:8px;align-items:center;padding:10px 12px;background:#12151bde;border-bottom:1px solid var(--line);backdrop-filter:blur(6px);z-index:10}
  .brand{font-weight:700;margin-right:8px}
  .btn{padding:8px 14px;border:1px solid var(--line);border-radius:12px;background:var(--card);color:var(--fg);cursor:pointer}
  .btn.active{background:var(--accent);color:#fff;border-color:transparent}
  .wrap{height:calc(100vh - 64px);display:flex;align-items:center;justify-content:center}
  img{max-width:100%;max-height:100%;object-fit:contain}
  .stamp{margin-left:auto;opacity:.9;font-size:.9em}
  .note{position:fixed;bottom:8px;left:50%;transform:translateX(-50%);opacity:.85;font-size:.85em;text-align:center;white-space:pre-line;max-width:92vw}
</style>
</head>
<body>
  <div class="top">
    <span class="brand">TDID Live</span>
    <button class="btn" id="brel">Brel</button>
    <button class="btn" id="delta">Delta</button>
    <button class="btn" id="erasme">Erasm.</button>
    <span class="stamp" id="stamp">—</span>
  </div>

  <div class="wrap"><img id="view" alt="TDID Live"></div>
  <div class="note" id="note"></div>

<script>
/* ====== SP (ta base) ====== */
const SP_BASE   = "https://stibmivb-my.sharepoint.com/personal/florent_legrain_stib_brussels";
const SP_FOLDER = "/personal/florent_legrain_stib_brussels/Documents/LiveMirror";
function spRaw(file){
  const src = `${SP_FOLDER}/${file}`;
  return `${SP_BASE}/_layouts/15/download.aspx?SourceUrl=${encodeURIComponent(src)}`;
}
const DATA_SP = {
  brel:   { img: spRaw("live_brel.png")   },
  delta:  { img: spRaw("live_delta.png")  },
  erasme: { img: spRaw("live_erasme.png") }
};
const ERR_IMG_SP = spRaw("TDID_Erreur.png");

/* ====== Miroir via Pages (PAS d’API) ====== */
const OWNER   = "Flo-App-bxl";
const REPO    = "TDID-Live";
const MIRBASE = `https://${OWNER}.github.io/${REPO}/mirror`;
const LATEST_TXT = `${MIRBASE}/latest.txt`;   // fichier texte public

const REFRESH_MS = 3000;
const STALE_MS   = 5*60*1000; // 5 min

/* UI */
const img   = document.getElementById('view');
const stamp = document.getElementById('stamp');
const note  = document.getElementById('note');
const btns  = { brel: brel, delta: delta, erasme: erasme };

let depot = localStorage.getItem('tdid_depot') || 'brel';
let lastBlobUrl = null;

function setActive(){ for(const k in btns){ btns[k].classList.toggle('active', k===depot); } }
for(const k in btns){ btns[k].onclick = ()=>{ depot=k; localStorage.setItem('tdid_depot', depot); setActive(); tick(true); }; }
setActive();

/* Utils */
const cb = u => u + (u.includes('?')?'&':'?') + 't=' + Date.now();
function setStamp(s){ stamp.textContent = `${s} • ${new Date().toLocaleString()}`; }

/* Parse latest.txt  (format lignes clé=valeur) */
async function readLatest(){
  const r = await fetch(cb(LATEST_TXT), {cache:'no-store'});
  if(!r.ok) throw new Error('HTTP '+r.status);
  const text = await r.text();
  const map = {};
  for(const line of text.split(/\r?\n/)){
    const m = line.match(/^\s*([a-z]+)\s*=\s*(.+?)\s*$/i);
    if(m) map[m[1].toLowerCase()] = m[2];
  }
  // attendu : brel=..., delta=..., erasme=..., updated=epochSec
  const make = (name)=> map[name] ? { url: `${MIRBASE}/${map[name]}`, name: map[name] } : null;
  return {
    brel:   make('brel'),
    delta:  make('delta'),
    erasme: make('erasme'),
    updated: Number(map.updated||0)*1000
  };
}

/* Âge miroir via nom ISO dans le fichier */
function msFromIsoName(name){
  const m = name && name.match(/_(\d{8}T\d{6}Z)\.png$/i);
  return m ? new Date(m[1]).getTime() : NaN;
}

/* Affiche SP */
function showSP(src){
  return new Promise(res=>{
    img.onload  = ()=>{ setStamp("SP"); res(true); };
    img.onerror = ()=>{ setStamp("SP (KO)"); res(false); };
    img.src = cb(src);
  });
}

/* Affiche miroir (blob) */
async function showMirror(url){
  try{
    const r = await fetch(cb(url), {cache:'no-store'});
    if(!r.ok) throw new Error('HTTP '+r.status);
    const blob = await r.blob();
    if (lastBlobUrl) URL.revokeObjectURL(lastBlobUrl);
    lastBlobUrl = URL.createObjectURL(blob);
    return await new Promise(res=>{
      img.onload  = ()=>{ setStamp("Miroir"); res(true); };
      img.onerror = ()=>{ setStamp("Miroir (KO)"); res(false); };
      img.src = lastBlobUrl;
    });
  }catch{ return false; }
}

/* Loop */
async function tick(force=false){
  const spUrl = DATA_SP[depot].img;
  let diag = `Depot: ${depot}\n`;

  // 1) lit latest.txt (Pages public, pas d’API → pas de 403)
  let latest;
  try { latest = await readLatest(); }
  catch(e){
    diag += `latest.txt KO (${e.message})\n`;
    const okSp = await showSP(spUrl);
    note.textContent = okSp ? diag + "miroir indisponible → SP direct OK" : diag + "miroir indisponible + SP KO → Erreur";
    if(!okSp){ img.src = ERR_IMG_SP; setStamp("Erreur"); }
    return;
  }

  const pick = latest[depot]; // {url, name}
  if(!pick || !pick.name){
    const okSp = await showSP(spUrl);
    note.textContent = okSp ? diag + "mirror vide → SP direct OK" : diag + "mirror vide + SP KO → Erreur";
    if(!okSp){ img.src = ERR_IMG_SP; setStamp("Erreur"); }
    return;
  }

  const tMs = msFromIsoName(pick.name);
  const ageMs = Number.isFinite(tMs) ? (Date.now()-tMs) : (Date.now()-(latest.updated||0));
  const ageSec = Math.round(ageMs/1000);
  const stale = ageMs >= STALE_MS;
  diag += `âge(miroir) • Δ=${ageSec}s → ${stale?'STALE':'OK'}\n`;

  if(stale){
    img.src = ERR_IMG_SP; setStamp("Erreur (miroir en retard)");
    note.textContent = diag + "→ Erreur (origine : miroir ≥ 5 min)";
    return;
  }

  // 2) source : SP prioritaire sinon miroir
  const okSp = await showSP(spUrl);
  if(okSp){ note.textContent = diag + "Source: SP (miroir utilisé pour l’âge)"; return; }

  const okMir = await showMirror(pick.url);
  if(okMir){ note.textContent = diag + "SP KO → Source: Miroir"; }
  else { img.src = ERR_IMG_SP; setStamp("Erreur (sources KO)"); note.textContent = diag + "SP KO + miroir KO → Erreur"; }
}

setInterval(()=>tick(false), REFRESH_MS);
tick(true);
</script>
</body>
</html>
