<!doctype html>
<html lang="fr">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>TDID Live – Brel / Delta / Erasm.</title>
<style>
  :root{--bg:#0f1115;--fg:#eaeef5;--card:#141923;--line:#1e2330;--accent:#1a5bff;--ok:#18c58f;--warn:#f2b636;--err:#ff4d4f}
  html,body{height:100%;margin:0;background:var(--bg);color:var(--fg);font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif}
  body{display:flex;flex-direction:column}
  .top{flex-shrink:0;height:64px;display:flex;gap:8px;align-items:center;padding:10px 12px;background:#12151bde;border-bottom:1px solid var(--line)}
  .brand{font-weight:700;margin-right:8px}
  .btn{padding:8px 14px;border:1px solid var(--line);border-radius:12px;background:var(--card);color:var(--fg);cursor:pointer}
  .btn.active{background:var(--accent);color:#fff;border-color:transparent}
  .status{display:flex;align-items:center;gap:8px;margin-left:auto}
  .dot{width:10px;height:10px;border-radius:50%}
  .dot.ok{background:var(--ok)} .dot.warn{background:var(--warn)} .dot.err{background:var(--err)}
  .stamp{opacity:.9;font-size:.9em}
  .wrap{flex:1;display:flex;align-items:center;justify-content:center;overflow:hidden;position:relative}
  img{max-width:100%;max-height:100%;object-fit:contain;display:block;margin:auto}

  .note{position:fixed;bottom:8px;left:50%;transform:translateX(-50%);opacity:.85;font-size:.9em;text-align:center;white-space:pre-line;max-width:92vw}

  /* Bandeau centre 70% opacité, texte défilant */
  .banner{
    position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);
    background:rgba(242,182,54,0.7);color:#000;padding:16px 24px;border-radius:14px;
    font-weight:700;font-size:1.4em;z-index:20;display:none;overflow:hidden;white-space:nowrap;width:80vw;text-align:center;
    box-shadow:0 0 14px rgba(0,0,0,0.4);
  }
  .banner span{display:inline-block;padding-left:100%;animation:scrollText 15s linear infinite;}
  @keyframes scrollText{0%{transform:translateX(0);}100%{transform:translateX(-100%);}}

  /* Splash vidéo (bloque l'affichage jusqu'à la fin) */
  .splash{
    position:absolute; inset:0; display:flex; align-items:center; justify-content:center;
    background:rgba(20,25,35,.9); z-index:30; backdrop-filter: blur(4px);
  }
  .splash-video{ position:relative; width:min(900px,92vw); aspect-ratio:16/9; }
  .splash-video video, .splash-video .fallback {
    position:absolute; inset:0; width:100%; height:100%; object-fit:cover; border-radius:12px;
  }
  .splash-video .fallback{
    display:flex; align-items:center; justify-content:center; font-weight:600; line-height:1.35;
    background:#0f1115; border:1px solid var(--line); color:#eaeef5;
  }
  .splash-video .skip{
    position:absolute; right:10px; bottom:10px; z-index:2;
    padding:8px 12px; border:1px solid var(--line); border-radius:10px; background:#141923; color:#fff; cursor:pointer; opacity:.9;
  }
</style>
</head>
<body>
  <div class="top">
    <span class="brand">TDID Live</span>
    <button class="btn" id="brel">Brel</button>
    <button class="btn" id="delta">Delta</button>
    <button class="btn" id="erasme">Erasm.</button>
    <div class="status">
      <span id="led" class="dot"></span>
      <span class="stamp" id="stamp">—</span>
    </div>
  </div>

  <!-- Bandeau FR + NL-BE -->
  <div class="banner" id="banner">
    <span>Refresh + de 10min - contrôler fiabilité via cellule ‘Last Refresh’ • Refresh +10 min – controleer betrouwbaarheid via cel ‘Last Refresh’</span>
  </div>

  <div class="wrap">
    <!-- Splash vidéo au démarrage -->
    <div class="splash" id="splash">
      <div class="splash-video">
        <video id="splashVideo"
               muted playsinline autoplay preload="auto"
               poster="https://raw.githubusercontent.com/Flo-App-bxl/TDID-Live/main/assets/intro_poster.jpg">
          <source src="https://raw.githubusercontent.com/Flo-App-bxl/TDID-Live/main/assets/intro.mp4" type="video/mp4">
        </video>
        <button id="skipIntro" class="skip">Passer • Overslaan</button>
        <div class="fallback">
          Veuillez patienter : démarrage en cours…<br/>Gelieve te wachten: opstart bezig…
        </div>
      </div>
    </div>

    <img id="view" alt="TDID Live">
  </div>

  <div class="note" id="note"></div>

<script>
/* ===== Constantes GitHub RAW ===== */
const GH_RAW="https://raw.githubusercontent.com/Flo-App-bxl/TDID-Live/main";
const ERR_IMG=`${GH_RAW}/TDID_Erreur.png`;
const MIRROR_DIR={brel:"mirror_brel",delta:"mirror_delta",erasme:"mirror_erasme"};

/* ===== Timings & règles ===== */
const REFRESH_MS=6000;          // boucle UI
const FETCH_MIN=60000;          // lecture latest.json max 1/min
const STALE_MS=10*60*1000;      // 10 min → stale
const CACHE_MIRROR_TTL=60000;   // affichage dernier miroir ≤ 60s si KO

/* ===== SharePoint par LIENS DE PARTAGE PUBLICS =====
   ⚠️ TODO: colle ici tes 3 liens de partage publics (i.e. “Copier le lien”)
   Format attendu: https://stibmivb-my.sharepoint.com/:i:/g/personal/....  */
const SP_LINKS = {
  brel:  "https://stibmivb-my.sharepoint.com/:i:/g/personal/florent_legrain_stib_brussels/XXXXXXXX?e=YYYY", // TODO
  delta: "https://stibmivb-my.sharepoint.com/:i:/g/personal/florent_legrain_stib_brussels/XXXXXXXX?e=YYYY", // TODO
  erasme:"https://stibmivb-my.sharepoint.com/:i:/g/personal/florent_legrain_stib_brussels/XXXXXXXX?e=YYYY"  // TODO
};
function spUrlFor(k){
  const base = SP_LINKS[k];
  return base ? (base + (base.includes('?')?'&':'?') + 't=' + Date.now()) : '';
}

/* ===== UI Refs ===== */
const img=document.getElementById('view'), note=document.getElementById('note'),
      led=document.getElementById('led'), stamp=document.getElementById('stamp'),
      banner=document.getElementById('banner'),
      splash=document.getElementById('splash'),
      splashVid=document.getElementById('splashVideo'),
      skipBtn=document.getElementById('skipIntro'),
      btns={brel:document.getElementById('brel'),delta:document.getElementById('delta'),erasme:document.getElementById('erasme')};

let depot=localStorage.getItem('tdid_depot')||'brel';
function setActive(){for(const k in btns){btns[k].classList.toggle('active',k===depot);}}
for(const k in btns){btns[k].onclick=()=>{depot=k;localStorage.setItem('tdid_depot',depot);setActive();forceFetch=true;tick();};}
setActive();

/* ===== Splash Vidéo (affichage bloqué jusqu'à fin) ===== */
let splashActive=true;
function showSplash(on){splash.style.display=on?'flex':'none';splashActive=on;}
function endSplash(reason){ if(!splashActive) return; showSplash(false); try{splashVid.pause();}catch{}; }
splashVid?.play().catch(()=>{});
splashVid?.addEventListener('playing',()=>{ const fb=splash.querySelector('.fallback'); if(fb) fb.style.display='none'; });
splashVid?.addEventListener('ended',()=>endSplash('ended'));
skipBtn?.addEventListener('click',()=>endSplash('skip'));
setTimeout(()=>endSplash('timeout'), 10000); // sécurité si la vidéo ne part pas

/* ===== Helpers ===== */
function setTop(status,label){ led.className='dot '+(status==='ok'?'ok':status==='warn'?'warn':'err'); stamp.textContent=`${label} • ${new Date().toLocaleString()}`; }
function showBannerOn(on){ banner.style.display = on ? 'block' : 'none'; }
function preload(src){ return new Promise(res=>{ const t=new Image(); t.onload=()=>res(true); t.onerror=()=>res(false); t.src = src + (src.includes('?')?'&':'?') + 't=' + Date.now(); }); }
/* renderFrom : ajoute un bypass local systématique */
function renderFrom(src, statusLabel, exact=false){
  return new Promise(res=>{
    const t=new Image();
    t.onload=()=>{
      let out=src;
      if(!exact) out = src + (src.includes('?')?'&':'?') + 'bypass=' + Date.now();
      img.src = out;
      setTop(statusLabel.status, statusLabel.text);
      // On ne retire pas le splash ici : il part SEULEMENT à la fin de la vidéo / skip / timeout.
      res(true);
    };
    t.onerror=()=>{ setTop('err', statusLabel.text+' KO'); res(false); };
    t.src = src + (src.includes('?')?'&':'?') + 'check=' + Date.now();
  });
}

/* ===== latest.json : RAW → CDN → API → RAW2 ===== */
let latestCache={}, lastFetchAt={}, lastHttp={}, lastSource={}, forceFetch=true;
for(const k of ['brel','delta','erasme']){ latestCache[k]=null; lastFetchAt[k]=0; lastHttp[k]=''; lastSource[k]='-'; }

const JSDELIVR=`https://cdn.jsdelivr.net/gh/Flo-App-bxl/TDID-Live@main`;
const GH_API=`https://api.github.com/repos/Flo-App-bxl/TDID-Live/contents`;
const cbMinute=u=>u + (u.includes('?')?'&':'?') + 'x_bypass=' + Math.floor(Date.now()/60000);

async function fetchLatest(k, forceAPI=false){
  const now=Date.now();
  if(!forceAPI && !forceFetch && now-lastFetchAt[k]<FETCH_MIN && latestCache[k]) return latestCache[k];

  const path = k==='brel'?'/time_brel/latest.json' : k==='delta'?'/time_delta/latest.json' : '/time_erasme/latest.json';
  const urlRAW  = cbMinute(`${GH_RAW}${path}`);
  const urlCDN  = cbMinute(`${JSDELIVR}${path}`);
  const urlAPI  = `${GH_API}${path}?ref=main`;
  const urlRAW2 = cbMinute(`${GH_RAW}${path}`);

  let trace=[], source='-';
  async function tryJson(url,opt,tag){ try{ const r=await fetch(url,opt); trace.push(`${tag}:${r.status}`); if(!r.ok) return null; source=tag; return await r.json(); }catch{ trace.push(`${tag}:fail`); return null; } }
  let j=null;

  if(!forceAPI){
    j = await tryJson(urlRAW,  {cache:'no-store', headers:{'Cache-Control':'no-store, no-cache'}}, 'RAW');
    if(!j) j = await tryJson(urlCDN, {cache:'no-store'}, 'CDN');
    if(!j) j = await tryJson(urlAPI, {cache:'no-store', headers:{'Accept':'application/vnd.github.v3.raw'}}, 'API');
    if(!j) j = await tryJson(urlRAW2,{cache:'no-store'}, 'RAW2');
  }else{
    j = await tryJson(urlAPI, {cache:'no-store', headers:{'Accept':'application/vnd.github.v3.raw'}}, 'API(force)');
  }

  lastFetchAt[k]=now; lastHttp[k]=trace.join(' '); lastSource[k]=source;
  if(!j) throw new Error('all fetch attempts failed');

  const it=j?.items?.[k]; if(!it?.ts) throw new Error('bad json');
  let imgUrl=it.url; 
  if(!imgUrl){ const f=(it.file||'').split('/').pop(); if(!f) throw new Error('no file'); imgUrl=`${GH_RAW}/${MIRROR_DIR[k]}/${f}`; }

  latestCache[k]={ts:Number(it.ts)*1000, url:imgUrl};
  forceFetch=false;
  return latestCache[k];
}

/* ===== Tick ===== */
let lastMirror={};
async function tick(){
  const k=depot; let diag=`Depot: ${k}\n`;
  let latest;

  try{ latest=await fetchLatest(k); }
  catch(e){ 
    // On laisse la vidéo, on n'affiche l'erreur que derrière
    await renderFrom(ERR_IMG,{status:'err',text:'Erreur'});
    note.textContent = `${diag}latest.json KO (${lastHttp[k]||e.message})\n→ Pas de données`;
    return;
  }

  let ageMs = Date.now()-latest.ts;
  let ageSec = Math.round(ageMs/1000);
  const tooOld = ageMs >= STALE_MS;

  // Forcer un appel API si Δ>60s
  if(ageMs > 60000){
    diag += `Age>60s → Forcing API refresh\n`;
    try{ latest=await fetchLatest(k,true); ageMs=Date.now()-latest.ts; ageSec=Math.round(ageMs/1000); }catch{ diag += `API force failed\n`; }
  }

  // 1) SharePoint (via lien public)
  const spUrl = spUrlFor(k);
  if (spUrl){
    const spOK = await preload(spUrl);
    if (spOK){
      await renderFrom(spUrl, {status: tooOld?'err':'ok', text:'SP'});
      showBannerOn(tooOld);
      note.textContent = `${diag}HTTP: ${lastHttp[k]} • source latest: ${lastSource[k]}\n`+
                         `age(miroir) • Δ=${ageSec}s → ${tooOld?'STALE':'OK'}\nsource: SP\nSP URL: ${spUrl}`;
      return;
    }
  }

  // 2) Si trop vieux et SP KO → erreur
  if(tooOld){
    await renderFrom(ERR_IMG,{status:'err',text:'Erreur (données >10min)'});
    note.textContent = `${diag}Δ=${ageSec}s → STALE\nsource: KO`;
    return;
  }

  // 3) Miroir (horodaté GitHub)
  const okMir = await renderFrom(latest.url, {status:'warn', text:'Miroir (horodaté)'}, true);
  if(okMir){
    lastMirror[k] = {url: latest.url, time: Date.now()};
    note.textContent = `${diag}HTTP: ${lastHttp[k]} • source latest: ${lastSource[k]}\n`+
                       `age(miroir) • Δ=${ageSec}s → OK\nsource: Miroir`;
    return;
  }

  // 4) Cache miroir ≤60s
  const cached = lastMirror[k];
  if(cached && (Date.now()-cached.time)<=CACHE_MIRROR_TTL){
    await renderFrom(cached.url, {status:'warn', text:'Miroir cache (≤60s)'}, true);
    note.textContent = `${diag}→ Miroir KO, affichage cache ≤60s`;
  } else {
    await renderFrom(ERR_IMG,{status:'err',text:'Erreur (miroir KO >60s)'});
    note.textContent = `${diag}→ Erreur : miroir KO et cache expiré`;
  }
}

/* ===== Start ===== */
setInterval(tick, REFRESH_MS);
tick();
</script>
</body>
</html>
