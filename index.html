<!doctype html>
<html lang="fr">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>TDID Live – Simple</title>
<style>
  :root{--bg:#0f1115;--fg:#eaeef5;--card:#141923;--line:#1e2330;--accent:#1a5bff;--ok:#18c58f;--warn:#f2b636;--err:#ff4d4f}
  html,body{height:100%;margin:0;background:var(--bg);color:var(--fg);font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif}
  body{display:flex;flex-direction:column}
  .top{flex-shrink:0;height:64px;display:flex;gap:8px;align-items:center;padding:10px 12px;background:#12151bde;border-bottom:1px solid var(--line)}
  .brand{font-weight:700;margin-right:8px}
  .btn{padding:8px 14px;border:1px solid var(--line);border-radius:12px;background:var(--card);color:var(--fg);cursor:pointer}
  .btn.active{background:var(--accent);color:#fff;border-color:transparent}
  .status{display:flex;align-items:center;gap:8px;margin-left:auto}
  .dot{width:10px;height:10px;border-radius:50%}
  .dot.ok{background:var(--ok)} .dot.warn{background:var(--warn)} .dot.err{background:var(--err)}
  .stamp{opacity:.9;font-size:.9em}
  .wrap{flex:1;display:flex;align-items:center;justify-content:center;overflow:hidden}
  img{max-width:100%;max-height:100%;object-fit:contain;display:block;margin:auto}
  .note{position:fixed;bottom:8px;left:50%;transform:translateX(-50%);opacity:.85;font-size:.9em;text-align:center;white-space:pre-line;max-width:92vw}

  /* Bandeau centre, 70% opacité, texte défilant (2x hauteur) */
  .banner{
    position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);
    background:rgba(242,182,54,0.7);color:#000;padding:16px 24px;border-radius:14px;
    font-weight:700;font-size:1.4em;z-index:20;display:none;overflow:hidden;white-space:nowrap;width:80vw;text-align:center;
    box-shadow:0 0 14px rgba(0,0,0,0.4);
  }
  .banner span{display:inline-block;padding-left:100%;animation:scrollText 15s linear infinite;}
  @keyframes scrollText{0%{transform:translateX(0);}100%{transform:translateX(-100%);}}
</style>
</head>
<body>
  <div class="top">
    <span class="brand">TDID Live</span>
    <button class="btn" id="brel">Brel</button>
    <button class="btn" id="delta">Delta</button>
    <button class="btn" id="erasme">Erasm.</button>
    <div class="status">
      <span id="led" class="dot"></span>
      <span class="stamp" id="stamp">—</span>
    </div>
  </div>

  <!-- Bandeau FR + NL-BE -->
  <div class="banner" id="banner">
    <span>Refresh + de 10min - contrôler fiabilité via cellule ‘Last Refresh’ • Refresh +10 min – controleer betrouwbaarheid via cel ‘Last Refresh’</span>
  </div>

  <div class="wrap"><img id="view" alt="TDID Live"></div>
  <div class="note" id="note"></div>

<script>
/* ====== Config ====== */
const GH_USER   = "Flo-App-bxl";
const GH_REPO   = "TDID-Live";
const GH_BRANCH = "main";
const GH_RAW    = `https://raw.githubusercontent.com/${GH_USER}/${GH_REPO}/${GH_BRANCH}`;

const MIRROR_DIR = { brel:"mirror_brel", delta:"mirror_delta", erasme:"mirror_erasme" };
const LATEST_URL = {
  brel:   `${GH_RAW}/time_brel/latest.json`,
  delta:  `${GH_RAW}/time_delta/latest.json`,
  erasme: `${GH_RAW}/time_erasme/latest.json`
};

const ERR_IMG    = `${GH_RAW}/TDID_Erreur.png`;
const REFRESH_MS = 6000;              // UI 6 s
const FETCH_MIN  = 60*1000;           // 1 vrai fetch/min
const STALE_MS   = 10*60*1000;        // 10 min → bandeau si SP OK

/* SharePoint (prioritaire) */
const SP_BASE   = "https://stibmivb-my.sharepoint.com/personal/florent_legrain_stib_brussels";
const SP_FOLDER = "/personal/florent_legrain_stib_brussels/Documents/LiveMirror";
const spRaw = f => `${SP_BASE}/_layouts/15/download.aspx?SourceUrl=${encodeURIComponent(SP_FOLDER + "/" + f)}`;
const DATA_SP = {
  brel:   { img: spRaw("live_brel.png") },
  delta:  { img: spRaw("live_delta.png") },
  erasme: { img: spRaw("live_erasme.png") }
};

/* ====== UI refs ====== */
const img   = document.getElementById('view');
const note  = document.getElementById('note');
const led   = document.getElementById('led');
const stamp = document.getElementById('stamp');
const banner= document.getElementById('banner');
const btns  = { brel:document.getElementById('brel'), delta:document.getElementById('delta'), erasme:document.getElementById('erasme') };

let depot = localStorage.getItem('tdid_depot') || 'brel';
function setActive(){ for(const k in btns){ btns[k].classList.toggle('active', k===depot); } }
for(const k in btns){ btns[k].onclick = () => { depot=k; localStorage.setItem('tdid_depot', depot); setActive(); forceFetch=true; tick(); }; }
setActive();

/* ====== État ====== */
let latestData = { brel:null, delta:null, erasme:null }; // {ts,url}
let lastFetchAt = { brel:0, delta:0, erasme:0 };
let lastHttp    = { brel:'', delta:'', erasme:'' };
let forceFetch  = true;

/* ====== Helpers ====== */
const cbMinute = u => u + (u.includes('?')?'&':'?') + 'x_bypass=' + Math.floor(Date.now()/60000);
function setTop(status,label){ led.className='dot '+(status==='ok'?'ok':status==='warn'?'warn':'err'); stamp.textContent=`${label} • ${new Date().toLocaleString()}`; }
function showBanner(show){ banner.style.display = show ? 'block' : 'none'; }
function preload(src, withCred=false){
  return new Promise(res=>{
    const t=new Image();
    if (withCred) t.referrerPolicy='no-referrer-when-downgrade';
    t.onload=()=>res(true); t.onerror=()=>res(false);
    t.src = src + (src.includes('?')?'&':'?') + 't=' + Date.now(); // anti-cache pour le test d’existence
  });
}
function renderFrom(src, statusLabel, exact=false){
  return new Promise(res=>{
    const t=new Image();
    t.onload=()=>{ img.src=t.src; setTop(statusLabel.status,statusLabel.text); res(true); };
    t.onerror=()=>{ setTop('err', statusLabel.text+' KO'); res(false); };
    t.src = exact ? src : (src + (src.includes('?')?'&':'?') + 't=' + Date.now());
  });
}

/* ====== Fetch latest.json (simple) ====== */
async function fetchLatest(depotKey){
  const now = Date.now();
  if (!forceFetch && now - lastFetchAt[depotKey] < FETCH_MIN && latestData[depotKey]) return latestData[depotKey];

  let http = '';
  try{
    const url = cbMinute(LATEST_URL[depotKey]);
    const r = await fetch(url, { cache:'no-store', headers:{'Cache-Control':'no-store, no-cache'} });
    http = `RAW:${r.status}`;
    if (!r.ok) throw new Error('HTTP '+r.status);
    const j = await r.json();
    const it = j?.items?.[depotKey];
    if (!it?.ts) throw new Error('bad json');
    let imgUrl = it.url;
    if (!imgUrl){
      const f = (it.file||'').split('/').pop();
      if (!f) throw new Error('no file');
      imgUrl = `${GH_RAW}/${MIRROR_DIR[depotKey]}/${f}`;
    }
    latestData[depotKey] = { ts: Number(it.ts)*1000, url: imgUrl };
    lastFetchAt[depotKey] = now;
    lastHttp[depotKey] = http;
    forceFetch = false;
    return latestData[depotKey];
  }catch(e){
    lastFetchAt[depotKey] = now;
    lastHttp[depotKey] = http ? http + ' fail' : 'fetch fail';
    throw e;
  }
}

/* ====== Tick (UI) ====== */
async function tick(){
  showBanner(false); // reset à chaque cycle
  const k = depot;
  let diag = `Depot: ${k}\n`;

  // 1) Lire latest.json (simple)
  let latest = null;
  try{
    latest = await fetchLatest(k);
  }catch(e){
    await renderFrom(ERR_IMG, {status:'err', text:'Erreur'});
    diag += `latest.json KO (${lastHttp[k]||e.message})\n→ Pas de données`;
    note.textContent = diag;
    return;
  }

  // 2) Calcul d'âge (simple)
  const ageMs  = Date.now() - latest.ts;
  const ageSec = Math.round(ageMs/1000);
  const tooOld = ageMs >= STALE_MS;

  // 3) SP prioritaire si dispo
  const sp = DATA_SP[k];
  const spOK = await preload(sp.img, true);

  if (spOK){
    await renderFrom(sp.img, {status: tooOld?'err':'ok', text:'SP'});
    if (tooOld) showBanner(true); else showBanner(false);
    setTop(tooOld?'err':'ok', tooOld?'SP (miroir ≥10min)':'SP');
    diag += `HTTP: ${lastHttp[k]} • last fetch: ${new Date(lastFetchAt[k]).toLocaleTimeString()}\n` +
            `age(miroir) • Δ=${ageSec}s → ${tooOld?'STALE':'OK'}\nsource: SP`;
    note.textContent = diag;
    return;
  }

  // 4) Sinon, miroir horodaté exact
  const okMir = await renderFrom(latest.url, {status: tooOld?'warn':'warn', text:'Miroir (horodaté)'}, true);
  if (okMir){
    showBanner(false); // bandeau réservé au cas SP+>10min
    diag += `HTTP: ${lastHttp[k]} • last fetch: ${new Date(lastFetchAt[k]).toLocaleTimeString()}\n` +
            `age(miroir) • Δ=${ageSec}s → ${tooOld?'STALE':'OK'}\nsource: Miroir`;
    note.textContent = diag;
  } else {
    await renderFrom(ERR_IMG, {status:'err', text:'Erreur'});
    showBanner(false);
    diag += `→ Erreur (miroir KO)`;
    note.textContent = diag;
  }
}

/* ====== Démarrage ====== */
setInterval(tick, REFRESH_MS);
tick();
</script>
</body>
</html>
