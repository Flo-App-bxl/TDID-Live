<!doctype html>
<html lang="fr">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>TDID Live – Brel / Delta / Erasm.</title>
<style>
  :root{--bg:#0f1115;--fg:#eaeef5;--card:#141923;--line:#1e2330;--accent:#1a5bff;
        --ok:#1fa971;--warn:#e0a100;--err:#e23b3b}
  html,body{height:100%;margin:0;background:var(--bg);color:var(--fg);font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif}
  body{padding-top:64px}
  .top{position:fixed;top:0;left:0;right:0;height:64px;display:flex;gap:8px;align-items:center;padding:10px 12px;background:#12151bde;border-bottom:1px solid var(--line);backdrop-filter:blur(6px);z-index:10}
  .brand{font-weight:700;margin-right:8px}
  .btn{padding:8px 14px;border:1px solid var(--line);border-radius:12px;background:var(--card);color:var(--fg);cursor:pointer}
  .btn.active{background:var(--accent);color:#fff;border-color:transparent}
  .wrap{height:calc(100vh - 64px);display:flex;align-items:center;justify-content:center}
  img{max-width:100%;max-height:100%;object-fit:contain}
  .right{margin-left:auto;display:flex;align-items:center;gap:10px}
  .badge{padding:4px 10px;border-radius:999px;font-size:.85em;border:1px solid var(--line)}
  .b-ok{background:color-mix(in srgb,var(--ok) 20%,transparent);border-color:color-mix(in srgb,var(--ok) 50%,#000);color:#eafff3}
  .b-warn{background:color-mix(in srgb,var(--warn) 20%,transparent);border-color:color-mix(in srgb,var(--warn) 50%,#000);color:#fff7e6}
  .b-err{background:color-mix(in srgb,var(--err) 20%,transparent);border-color:color-mix(in srgb,var(--err) 50%,#000);color:#ffeaec}
  .stamp{opacity:.9;font-size:.9em}
  .note{position:fixed;bottom:8px;left:50%;transform:translateX(-50%);opacity:.85;font-size:.85em;text-align:center;white-space:pre-line;max-width:92vw}
</style>
</head>
<body>
  <div class="top">
    <span class="brand">TDID Live</span>
    <button class="btn" id="brel">Brel</button>
    <button class="btn" id="delta">Delta</button>
    <button class="btn" id="erasme">Erasm.</button>
    <div class="right">
      <span id="srcbadge" class="badge">—</span>
      <span class="stamp" id="stamp">—</span>
    </div>
  </div>

  <div class="wrap"><img id="view" alt="TDID Live"></div>
  <div class="note" id="note"></div>

<script>
/* ====== CONFIG SP ====== */
/* Chemins SharePoint : adapte uniquement SP_BASE/SP_FOLDER si besoin */
const SP_BASE   = "https://stibmivb-my.sharepoint.com/personal/florent_legrain_stib_brussels";
const SP_FOLDER = "/personal/florent_legrain_stib_brussels/Documents/LiveMirror";
const spRaw = f => `${SP_BASE}/_layouts/15/download.aspx?SourceUrl=${encodeURIComponent(SP_FOLDER + "/" + f)}`;

/* Ton script VBA dépose ce JSON (conseillé: 'latest.json') AUX CÔTÉS des PNG et age.txt */
const SP_LATEST = spRaw("latest.json");

/* ====== miroirs GitHub (images horodatées référencées par latest.json) ====== */
/* Pas besoin de lister le dossier GitHub : on lit l’URL depuis latest.json (hébergé sur SP). */

/* Dépôts */
const DATA = {
  brel:   { spImg: spRaw("live_brel.png"),   spAge: spRaw("live_brel.age.txt"),   key:"brel"  },
  delta:  { spImg: spRaw("live_delta.png"),  spAge: spRaw("live_delta.age.txt"),  key:"delta" },
  erasme: { spImg: spRaw("live_erasme.png"), spAge: spRaw("live_erasme.age.txt"), key:"eras"  }
};

/* Image d’erreur (hébergée sur SP) */
const ERR_IMG_SP = spRaw("TDID_Erreur.png");

/* Rafraîchissement & seuil (5 min) */
const REFRESH_MS = 3000;
const STALE_MS   = 5 * 60 * 1000;

/* ====== UI refs ====== */
const img   = document.getElementById('view');
const stamp = document.getElementById('stamp');
const note  = document.getElementById('note');
const badge = document.getElementById('srcbadge');
const btns  = { brel:document.getElementById('brel'), delta:document.getElementById('delta'), erasme:document.getElementById('erasme') };

let depot = localStorage.getItem('tdid_depot') || 'brel';
function setActive(){ for(const k in btns){ btns[k].classList.toggle('active', k===depot); } }
for(const k in btns){ btns[k].onclick = () => { depot=k; localStorage.setItem('tdid_depot', depot); setActive(); tick(true); }; }
setActive();

/* ====== Utils ====== */
const cb = u => u + (u.includes('?')?'&':'?') + 't=' + Date.now();

function setBadge(kind){
  badge.className = 'badge';
  if (kind==='SP')       badge.classList.add('b-ok'),   badge.textContent = 'SP';
  else if (kind==='MIR') badge.classList.add('b-warn'), badge.textContent = 'Miroir';
  else if (kind==='ERR') badge.classList.add('b-err'),  badge.textContent = 'Erreur';
  else                   badge.textContent = '—';
}

function setStamp(){ stamp.textContent = new Date().toLocaleString(); }

function normalizeEpoch(raw){
  if (raw == null) return null;
  let s = String(raw).replace(/^\uFEFF/,'').trim();
  if (!/^\d+$/.test(s)) s = s.replace(/[^\d]/g,'');
  if (!s) return null;
  let ms = Number(s);
  if (ms < 1e12) ms *= 1000;
  const now = Date.now();
  if (ms - now > 10*60*1000){
    const offsetMin = new Date().getTimezoneOffset();
    ms = ms - offsetMin*60000;
  }
  return ms;
}

/* Petit test d’accessibilité SP basé sur un <img> invisible (contourne les limites fetch CORS) */
function testSharePointAccess(url, timeoutMs=2000){
  return new Promise(resolve=>{
    const probe = new Image();
    let done = false;
    const t = setTimeout(()=>{ if(!done){done=true;resolve(false);} }, timeoutMs);
    probe.onload  = ()=>{ if(!done){done=true;clearTimeout(t);resolve(true);} };
    probe.onerror = ()=>{ if(!done){done=true;clearTimeout(t);resolve(true);} }; // 404 suffit pour prouver l'accès
    probe.src = cb(url);
  });
}

/* Lecture de age.txt sur SP (seulement si SP est accessible) */
async function readAgeSP(url){
  const spOk = await testSharePointAccess(url);
  if (!spOk) return {ms:null, why:'SP non accessible'};
  try{
    const r = await fetch(cb(url), {cache:'no-store', credentials:'include'});
    if(!r.ok) return {ms:null, why:'HTTP '+r.status};
    const raw = await r.text();
    const ms  = normalizeEpoch(raw);
    if (!Number.isFinite(ms)) return {ms:null, why:'parse'};
    return {ms, why:null};
  }catch(e){ return {ms:null, why:'fetch'}; }
}

/* Lecture latest.json déposé sur SP par ton script VBA */
async function readLatestSP(){
  const spOk = await testSharePointAccess(SP_LATEST);
  if (!spOk) return {ok:false, why:'SP non accessible'};
  try{
    const r = await fetch(cb(SP_LATEST), {cache:'no-store', credentials:'include'});
    if(!r.ok) return {ok:false, why:'HTTP '+r.status};
    const j = await r.json();
    return {ok:true, data:j};
  }catch(e){ return {ok:false, why:'fetch'}; }
}

/* Affiche une image SP */
function showSP(src){
  return new Promise(res=>{
    img.onload  = ()=>{ setBadge('SP'); setStamp(); res(true); };
    img.onerror = ()=>{ setBadge('SP'); setStamp(); res(false); };
    img.src = cb(src);
  });
}

/* Affiche une image miroir (URL fournie dans latest.json) */
async function showMirror(url){
  try{
    const r = await fetch(cb(url), {cache:'no-store'});
    if (!r.ok) throw new Error('HTTP '+r.status);
    const blob = await r.blob();
    const u = URL.createObjectURL(blob);
    return await new Promise(ok=>{
      img.onload  = ()=>{ setBadge('MIR'); setStamp(); ok(true); };
      img.onerror = ()=>{ setBadge('MIR'); setStamp(); ok(false); };
      img.src = u;
    });
  }catch(e){ return false; }
}

/* ====== Boucle ====== */
async function tick(force=false){
  const cfg = DATA[depot];
  let diag = `Depot: ${depot}\n`;

  // 1) âge prioritaire via SP (age.txt), sinon via SP latest.json
  let ageMs = null, ageWhy = null, mirrorUrl = null;

  const a = await readAgeSP(cfg.spAge);
  if (a.ms !== null){
    ageMs = Date.now() - a.ms;
    diag += `age(SP) OK • Δ=${Math.round(ageMs/1000)}s`;
  } else {
    diag += `age(SP) indisponible (${a.why})`;
    const L = await readLatestSP();
    if (L.ok){
      const item = L.data?.items?.[cfg.key];
      if (item?.ts && Number.isFinite(item.ts)){
        ageMs = Date.now() - (item.ts*1000);
        mirrorUrl = item.url || null;
        diag += `\nage(latest.json) OK • Δ=${Math.round(ageMs/1000)}s`;
      } else {
        diag += `\nlatest.json présent mais incomplet`;
      }
    } else {
      diag += `\nlatest.json indisponible (${L.why})`;
    }
  }

  // 1b) si on a un âge et qu'il est trop vieux -> erreur directe
  if (ageMs !== null && ageMs >= STALE_MS){
    await showSP(ERR_IMG_SP);
    setBadge('ERR'); setStamp();
    note.textContent = diag + `\n→ Erreur (miroir/SP en retard ≥ 5 min)`;
    return;
  }

  // 2) affiche d'abord SP
  const okSp = await showSP(cfg.spImg);
  if (okSp){
    note.textContent = diag + `\nsource: SP`;
    return;
  }

  // 3) fallback miroir via latest.json (si on l’a)
  if (!mirrorUrl){
    const L2 = await readLatestSP();
    if (L2.ok){
      const item = L2.data?.items?.[cfg.key];
      if (item?.url) mirrorUrl = item.url;
    }
  }

  if (mirrorUrl){
    const okMir = await showMirror(mirrorUrl);
    if (okMir){
      note.textContent = diag + `\nsource: Miroir`;
      return;
    }
  } else {
    diag += `\nmirror url indisponible`;
  }

  // 4) sinon -> erreur
  await showSP(ERR_IMG_SP);
  setBadge('ERR'); setStamp();
  note.textContent = diag + `\n→ Erreur (sources indisponibles)`;
}

setInterval(()=>tick(false), REFRESH_MS);
tick(true);
</script>
</body>
</html>
