<!doctype html>
<html lang="fr">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>TDID Live – SP prioritaire, bandeau latched, bouton Miroir 15 min</title>
<style>
  :root{--bg:#0f1115;--fg:#eaeef5;--card:#141923;--line:#1e2330;--accent:#1a5bff;--ok:#18c58f;--warn:#f2b636;--err:#ff4d4f}
  html,body{height:100%;margin:0;background:var(--bg);color:var(--fg);font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif}
  body{display:flex;flex-direction:column}
  .top{flex-shrink:0;height:64px;display:flex;gap:8px;align-items:center;padding:10px 12px;background:#12151bde;border-bottom:1px solid var(--line)}
  .brand{font-weight:700;margin-right:8px}
  .btn{padding:8px 14px;border:1px solid var(--line);border-radius:12px;background:var(--card);color:var(--fg);cursor:pointer}
  .btn.active{background:var(--accent);color:#fff;border-color:transparent}
  .status{display:flex;align-items:center;gap:8px;margin-left:auto}
  .dot{width:10px;height:10px;border-radius:50%}
  .dot.ok{background:var(--ok)} .dot.warn{background:var(--warn)} .dot.err{background:var(--err)}
  .stamp{opacity:.9;font-size:.9em}
  .toggle{padding:6px 10px;border:1px solid var(--line);border-radius:10px;background:#1b2130;color:#fff;cursor:pointer;font-size:.85em}
  .toggle.active{background:#2a3347}
  .wrap{flex:1;display:flex;align-items:center;justify-content:center;overflow:hidden;position:relative}
  img{max-width:100%;max-height:100%;object-fit:contain;display:block;margin:auto}
  .note{position:fixed;bottom:8px;left:50%;transform:translateX(-50%);opacity:.85;font-size:.9em;text-align:center;white-space:pre-line;max-width:92vw}
  .banner{
    position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);
    background:rgba(242,182,54,0.7);color:#000;padding:24px 28px;border-radius:16px;
    font-weight:700;font-size:1.6em;z-index:20;display:none;overflow:hidden;white-space:nowrap;width:80vw;text-align:center;
    box-shadow:0 0 14px rgba(0,0,0,0.4);
  }
  .banner span{display:inline-block;padding-left:100%;animation:scrollText 15s linear infinite;}
  @keyframes scrollText{0%{transform:translateX(0);}100%{transform:translateX(-100%);}}
  /* Splash vidéo */
  .splash{
    position:absolute; inset:0; display:flex; align-items:center; justify-content:center;
    background:rgba(20,25,35,.9); z-index:30; backdrop-filter: blur(4px);
  }
  .splash-video{ position:relative; width:min(900px,92vw); aspect-ratio:16/9; }
  .splash-video video{
    position:absolute; inset:0; width:100%; height:100%; object-fit:cover; border-radius:12px;
    z-index:1; /* vidéo au-dessus */
  }
  .splash-video .fallback{
    position:absolute; inset:0; display:flex; align-items:center; justify-content:center;
    font-weight:600; line-height:1.35;
    background:#0f1115; border:1px solid var(--line); color:#eaeef5;
    z-index:0; /* texte en dessous */
  }
  .splash-video .skip{
    position:absolute; right:10px; bottom:10px; z-index:2;
    padding:8px 12px; border:1px solid var(--line); border-radius:10px; background:#141923; color:#fff; cursor:pointer; opacity:.9;
  }
</style>
</head>
<body>
  <div class="top">
    <span class="brand">TDID Live</span>
    <button class="btn" id="brel">Brel</button>
    <button class="btn" id="delta">Delta</button>
    <button class="btn" id="erasme">Erasm.</button>
    <div class="status">
      <button id="forceMirror" class="toggle" title="Forcer le mode miroir pendant 15 min">Miroir 15 min</button>
      <span id="led" class="dot"></span>
      <span class="stamp" id="stamp">—</span>
    </div>
  </div>

  <div class="banner" id="banner">
    <span>Refresh &gt;5min - contrôler fiabilité via cellule ‘Last Refresh’ • Refresh &gt;5min – controleer betrouwbaarheid via cel ‘Last Refresh’</span>
  </div>

  <div class="wrap">
    <div class="splash" id="splash">
      <div class="splash-video">
        <video id="splashVideo" muted playsinline autoplay preload="auto" style="z-index:1"
               poster="https://raw.githubusercontent.com/Flo-App-bxl/TDID-Live/main/assets/intro_poster.jpg">
          <source src="https://raw.githubusercontent.com/Flo-App-bxl/TDID-Live/main/assets/intro.mp4" type="video/mp4">
        </video>
        <button id="skipIntro" class="skip">Passer • Overslaan</button>
        <div class="fallback">Veuillez patienter : démarrage en cours…<br/>Gelieve te wachten: opstart bezig…</div>
      </div>
    </div>
    <img id="view" alt="TDID Live">
  </div>

  <div class="note" id="note"></div>

<script>
/* ====== Constantes ====== */
const GH_USER="Flo-App-bxl", GH_REPO="TDID-Live", GH_BRANCH="main";
const GH_RAW = `https://raw.githubusercontent.com/${GH_USER}/${GH_REPO}/${GH_BRANCH}`;
const GH_API = `https://api.github.com/repos/${GH_USER}/${GH_REPO}/contents`;
const JSDELIVR = `https://cdn.jsdelivr.net/gh/${GH_USER}/${GH_REPO}@${GH_BRANCH}`;
const MIRROR_DIR={brel:"mirror_brel",delta:"mirror_delta",erasme:"mirror_erasme"};
const ERR_IMG=`${GH_RAW}/TDID_Erreur.png`;

/* timings */
const REFRESH_MS=6000;
const FETCH_MIN=60*1000;          // lecture latest.json (hors force API)
const MIRROR_FORCE_MS=60*1000;    // force API toutes 60 s en miroir
const BANNER_GT5=5*60*1000;       // bandeau si âge miroir > 5 min (SP only)
const MIRROR_ERR_10=10*60*1000;   // erreur si âge miroir > 10 min (miroir)
const CACHE_MIRROR_TTL=60*1000;

/* SharePoint */
const SP_BASE="https://stibmivb-my.sharepoint.com/personal/florent_legrain_stib_brussels";
const SP_FOLDER="/personal/florent_legrain_stib_brussels/Documents/LiveMirror";
const spRaw=f=>`${SP_BASE}/_layouts/15/download.aspx?SourceUrl=${encodeURIComponent(SP_FOLDER+"/"+f)}&t=${Date.now()}`;
const DATA_SP={brel:{img:spRaw("live_brel.png")},delta:{img:spRaw("live_delta.png")},erasme:{img:spRaw("live_erasme.png")}};

/* ====== UI refs ====== */
const img=document.getElementById('view'), note=document.getElementById('note'),
      led=document.getElementById('led'), stamp=document.getElementById('stamp'),
      banner=document.getElementById('banner'),
      splash=document.getElementById('splash'), splashVid=document.getElementById('splashVideo'),
      skipBtn=document.getElementById('skipIntro'),
      forceBtn=document.getElementById('forceMirror');
const btns={brel:document.getElementById('brel'),delta:document.getElementById('delta'),erasme:document.getElementById('erasme')};

let depot=localStorage.getItem('tdid_depot')||'brel';
function setActive(){for(const k in btns){btns[k].classList.toggle('active',k===depot);}}
for(const k in btns){btns[k].onclick=()=>{depot=k;localStorage.setItem('tdid_depot',depot);setActive();forceFetch=true;tick();};}
setActive();

/* ====== Vidéo intro ====== */
let splashActive=true;
function endSplash(){if(!splashActive)return;splash.style.display='none';splashActive=false;try{splashVid.pause();}catch{}}
function tryPlayVideo(){if(!splashVid)return Promise.resolve();splashVid.muted=true;splashVid.playsInline=true;splashVid.autoplay=true;return splashVid.play().catch(()=>{});}
document.addEventListener('DOMContentLoaded',()=>{tryPlayVideo();});
setTimeout(()=>{tryPlayVideo();},600);
splashVid?.addEventListener('canplay',()=>{tryPlayVideo();});
skipBtn?.addEventListener('click',endSplash);
setTimeout(endSplash,8000);

/* ====== État ====== */
let latestData={brel:null,delta:null,erasme:null}; // {ts,url}
let lastFetchAt={brel:0,delta:0,erasme:0};
let lastHttp={brel:'',delta:'',erasme:''};
let lastSource={brel:'',delta:'',erasme:''};
let lastMirror={brel:null,delta:null,erasme:null}; // {url,time}
let forceFetch=true;

/* Bandeau latched par dépôt (reste ON tant que l’âge n’est pas revenu ≤5 min) */
let bannerLatched={brel:false,delta:false,erasme:false};

/* Mode miroir & force API timer */
let isMirror=false, mirrorForceTimer=null;
/* Override manuel “Miroir 15 min” (persiste localStorage) */
const OV_KEY='tdid_mirror_override_until';
function overrideActive(){
  const x=Number(localStorage.getItem(OV_KEY)||0);
  return Number.isFinite(x) && Date.now()<x;
}
function setOverride(minutes){
  const until=Date.now()+minutes*60*1000;
  localStorage.setItem(OV_KEY,String(until));
  updateForceBtn();
}
function clearOverride(){
  localStorage.removeItem(OV_KEY);
  updateForceBtn();
}
function updateForceBtn(){
  const on=overrideActive();
  forceBtn.classList.toggle('active',on);
  forceBtn.textContent = on ? "Miroir (forcé) ⏱" : "Miroir 15 min";
}
updateForceBtn();
forceBtn.addEventListener('click',()=>{
  if(overrideActive()){ clearOverride(); } else { setOverride(15); }
  forceFetch=true;
  tick();
});

function enterMirror(startupKick=true){
  if(!isMirror){
    isMirror=true;
    if(startupKick) fetchLatest(depot,{forceApi:true}).catch(()=>{});
    if(mirrorForceTimer) clearInterval(mirrorForceTimer);
    mirrorForceTimer=setInterval(()=>{
      if(isMirror) fetchLatest(depot,{forceApi:true}).catch(()=>{});
    }, MIRROR_FORCE_MS);
  }
}
function leaveMirror(){
  isMirror=false;
  if(mirrorForceTimer){ clearInterval(mirrorForceTimer); mirrorForceTimer=null; }
}

/* ====== Helpers ====== */
function setTop(status,label){led.className='dot '+(status==='ok'?'ok':status==='warn'?'warn':'err');stamp.textContent=`${label} • ${new Date().toLocaleString()}`;}
function showBanner(show){banner.style.display=show?'block':'none';}
function renderFrom(src,statusLabel,exact=false){
  return new Promise(res=>{
    const t=new Image();
    t.onload=()=>{img.src=t.src;setTop(statusLabel.status,statusLabel.text);res(true);};
    t.onerror=()=>{setTop('err',statusLabel.text+' KO');res(false);};
    t.src=exact?src:(src+(src.includes('?')?'&':'?')+'t='+Date.now());
  });
}

/* ====== SP loader (fetch→blob si possible, sinon <img> direct) ====== */
async function loadSpImage(k){
  const u = DATA_SP[k].img;
  // Voie A : fetch pour blob (anti-cache fort)
  try{
    const r=await fetch(u,{cache:'no-store',credentials:'include',mode:'cors'});
    if(r.ok){
      const blob=await r.blob();
      const url=URL.createObjectURL(blob);
      return {ok:true,url,via:'fetch'};
    }
  }catch(e){}
  // Voie B : <img> direct
  const okImg=await new Promise(res=>{const im=new Image();im.onload=()=>res(true);im.onerror=()=>res(false);im.referrerPolicy='no-referrer-when-downgrade';im.src=u;});
  if(okImg) return {ok:true,url:u,via:'img'};
  return {ok:false,reason:'Load failed'};
}

/* ====== latest.json ====== */
async function fetchLatest(k,{forceApi=false}={}){
  const now=Date.now();
  if(!forceApi && !forceFetch && now-lastFetchAt[k]<FETCH_MIN && latestData[k]) return latestData[k];

  const path = k==='brel'?'/time_brel/latest.json'
             : k==='delta'?'/time_delta/latest.json'
             : '/time_erasme/latest.json';

  const urlRAW = `${GH_RAW}${path}?x_bypass=${Math.floor(now/60000)}`;
  const urlCDN = `${JSDELIVR}${path}?x_bypass=${Math.floor(now/60000)}`;
  const urlAPI = `${GH_API}${path}?ref=${GH_BRANCH}&_=${now}`;

  let trace=[],source='-';
  async function tryJson(url,init,tag){
    try{
      const r=await fetch(url,init); trace.push(`${tag}:${r.status}`); if(!r.ok) return null; source=tag; return await r.json();
    }catch(e){ trace.push(`${tag}:fail`); return null; }
  }
  let j=null;
  if(forceApi){
    j=await tryJson(urlAPI,{cache:'no-store',headers:{'Accept':'application/vnd.github.v3.raw'}},'API*');
    if(!j) j=await tryJson(urlRAW,{cache:'no-store'},'RAW');
    if(!j) j=await tryJson(urlCDN,{cache:'no-store',headers:{'Accept':'application/json'}},'CDN');
  }else{
    j=await tryJson(urlRAW,{cache:'no-store'},'RAW');
    if(!j) j=await tryJson(urlCDN,{cache:'no-store',headers:{'Accept':'application/json'}},'CDN');
    if(!j) j=await tryJson(urlAPI,{cache:'no-store',headers:{'Accept':'application/vnd.github.v3.raw'}},'API');
  }
  lastFetchAt[k]=now; lastHttp[k]=trace.join(' '); lastSource[k]=source;
  if(!j) throw new Error('all fetch attempts failed');

  const it=j?.items?.[k]; if(!it?.ts) throw new Error('bad json');
  let imgUrl=it.url;
  if(!imgUrl){const f=(it.file||'').split('/').pop(); if(!f) throw new Error('no file'); imgUrl=`${GH_RAW}/${MIRROR_DIR[k]}/${f}`;}
  latestData[k]={ts:Number(it.ts)*1000,url:imgUrl};
  forceFetch=false; return latestData[k];
}

/* ====== Tick principal ====== */
async function tick(){
  const k=depot; let diag=`Depot: ${k}\n`; showBanner(false);

  // Override manuel ?
  const override=overrideActive();

  // Si pas d'override et SP dispo → MODE SP (bandeau SP only, latched)
  if(!override){
    const spRes=await loadSpImage(k);
    if(spRes.ok){
      leaveMirror();
      await renderFrom(spRes.url,{status:'ok',text:'SP'},true);

      // Calcul âge miroir en fond → mise à jour du "latch" du bandeau (SP uniquement)
      (async ()=>{
        try{
          const latest=await fetchLatest(k);
          const ageMs=Date.now()-latest.ts, ageSec=Math.round(ageMs/1000);
          if(ageMs>BANNER_GT5) bannerLatched[k]=true;
          else bannerLatched[k]=false;
          showBanner(bannerLatched[k]);
          note.textContent =
            `${diag}Mode SP${override?' (override ignoré)':''}\nsource latest: ${lastSource[k]} | ${lastHttp[k]}\n`+
            `âge miroir • Δ=${ageSec}s → ${bannerLatched[k]?'Bandeau ON (latched >5min)':'Bandeau OFF (≤5min)'}\nsource: SP`;
        }catch(e){
          // on n’éteint pas le bandeau si on n’a pas pu lire l’âge ; on garde l’état courant
          showBanner(bannerLatched[k]);
          note.textContent = `${diag}Mode SP\nlatest.json KO (${lastHttp[k]||e.message})\nsource: SP`;
        }
      })();
      return;
    }
    // sinon SP KO → on tombera en miroir
    diag += `SP KO → bascule miroir\n`;
  } else {
    diag += `Override manuel: miroir forcé jusqu'à ${new Date(Number(localStorage.getItem(OV_KEY)||0)).toLocaleTimeString()}\n`;
  }

  // MODE MIROIR (ou override)
  enterMirror(true); // force API immédiate au basculement
  let latest=null;
  try{ latest=await fetchLatest(k,{forceApi:true}); }
  catch(e){
    const cached=lastMirror[k];
    if(cached && (Date.now()-cached.time)<=CACHE_MIRROR_TTL){
      await renderFrom(cached.url,{status:'warn',text:'Miroir cache (≤60s)'},true);
      showBanner(false); // jamais de bandeau en mode miroir
      note.textContent = `${diag}Mode Miroir (API KO)\n→ Affichage cache ≤60s`;
      return;
    }
    await renderFrom(ERR_IMG,{status:'err',text:'Erreur'});
    showBanner(false);
    note.textContent = `${diag}Mode Miroir (API KO)\n→ Pas de données`;
    return;
  }

  const ageMs=Date.now()-latest.ts, ageSec=Math.round(ageMs/1000);
  if(ageMs>MIRROR_ERR_10){
    await renderFrom(ERR_IMG,{status:'err',text:'Erreur (miroir >10min)'});
    showBanner(false);
    note.textContent = `${diag}Mode Miroir\nsource latest: ${lastSource[k]} | ${lastHttp[k]}\nâge miroir • Δ=${ageSec}s (>600s) → Erreur`;
    return;
  }

  const okMir=await renderFrom(latest.url,{status:'warn',text:'Miroir (horodaté)'},true);
  if(okMir){
    lastMirror[k]={url:latest.url,time:Date.now()};
    showBanner(false); // bandeau OFF en miroir
    note.textContent = `${diag}Mode Miroir\nsource latest: ${lastSource[k]} | ${lastHttp[k]}\nâge miroir • Δ=${ageSec}s (≤600s)`;
    return;
  }

  const cached=lastMirror[k];
  if(cached && (Date.now()-cached.time)<=CACHE_MIRROR_TTL){
    await renderFrom(cached.url,{status:'warn',text:'Miroir cache (≤60s)'},true);
    showBanner(false);
    note.textContent = `${diag}Mode Miroir\n→ Miroir KO, affichage cache ≤60s`;
  } else {
    await renderFrom(ERR_IMG,{status:'err',text:'Erreur (miroir KO >60s)'});
    showBanner(false);
    note.textContent = `${diag}Mode Miroir\n→ Erreur : miroir KO et cache expiré`;
  }
}

/* ====== Start ====== */
setInterval(()=>{
  // auto-clear override si expiré (et mettre à jour le bouton)
  if(!overrideActive()) updateForceBtn();
  tick();
}, REFRESH_MS);

tick();
</script>
</body>
</html>
