<!doctype html>
<html lang="fr">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>TDID Live – Brel / Delta / Erasm.</title>
<style>
  :root{--bg:#0f1115;--fg:#eaeef5;--card:#141923;--line:#1e2330;--accent:#1a5bff}
  html,body{height:100%;margin:0;background:var(--bg);color:var(--fg);font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif}
  body{padding-top:64px}
  .top{position:fixed;top:0;left:0;right:0;height:64px;display:flex;gap:8px;align-items:center;padding:10px 12px;background:#12151bde;border-bottom:1px solid var(--line);backdrop-filter:blur(6px);z-index:10}
  .brand{font-weight:700;margin-right:8px}
  .btn{padding:8px 14px;border:1px solid var(--line);border-radius:12px;background:var(--card);color:var(--fg);cursor:pointer}
  .btn.active{background:var(--accent);color:#fff;border-color:transparent}
  .wrap{height:calc(100vh - 64px);display:flex;align-items:center;justify-content:center}
  img{max-width:100%;max-height:100%;object-fit:contain}
  .stamp{margin-left:auto;opacity:.9;font-size:.9em}
  .note{position:fixed;bottom:8px;left:50%;transform:translateX(-50%);opacity:.85;font-size:.85em;text-align:center;white-space:pre-line;max-width:92vw}
</style>
</head>
<body>
  <div class="top">
    <span class="brand">TDID Live</span>
    <button class="btn" id="brel">Brel</button>
    <button class="btn" id="delta">Delta</button>
    <button class="btn" id="erasme">Erasm.</button>
    <span class="stamp" id="stamp">—</span>
  </div>

  <div class="wrap"><img id="view" alt="TDID Live"></div>
  <div class="note" id="note"></div>

<script>
/* ========================
   CONFIG
   ======================== */

/* SharePoint (source prioritaire si dispo) */
const SP_BASE   = "https://stibmivb-my.sharepoint.com/personal/florent_legrain_stib_brussels";
const SP_FOLDER = "/personal/florent_legrain_stib_brussels/Documents/LiveMirror";
const spRaw = f => `${SP_BASE}/_layouts/15/download.aspx?SourceUrl=${
  encodeURIComponent(SP_FOLDER + "/" + f)
}`;

/* Miroir (GitHub Pages + API GitHub pour lister le dernier fichier) */
const GH_USER   = "Flo-App-bxl";
const GH_REPO   = "TDID-Live";
const GH_BRANCH = "gh-pages";

const MIRROR_DIR_PAGES = `https://${GH_USER}.github.io/${GH_REPO}/mirror/`;
const MIRROR_DIR_API   = `https://api.github.com/repos/${GH_USER}/${GH_REPO}/contents/mirror?ref=${GH_BRANCH}`;

/* Dépôts (noms de fichiers SP) */
const DATA = {
  brel:   { spImg: spRaw("live_brel.png"),   spAge: spRaw("live_brel.age.txt"),   mirrorPrefix: "brel_"   },
  delta:  { spImg: spRaw("live_delta.png"),  spAge: spRaw("live_delta.age.txt"),  mirrorPrefix: "delta_"  },
  erasme: { spImg: spRaw("live_erasme.png"), spAge: spRaw("live_erasme.age.txt"), mirrorPrefix: "erasme_" }
};
const ERR_IMG_SP = spRaw("TDID_Erreur.png");

/* Rafraîchissement + seuil 5 minutes */
const REFRESH_MS = 3000;
const STALE_MS   = 5 * 60 * 1000;

/* ========================
   UI
   ======================== */
const img   = document.getElementById('view');
const stamp = document.getElementById('stamp');
const note  = document.getElementById('note');
const btns  = {
  brel:  document.getElementById('brel'),
  delta: document.getElementById('delta'),
  erasme:document.getElementById('erasme')
};

let depot = localStorage.getItem('tdid_depot') || 'brel';
function setActive(){ for(const k in btns){ btns[k].classList.toggle('active', k===depot); } }
for(const k in btns){
  btns[k].onclick = () => { depot=k; localStorage.setItem('tdid_depot', depot); setActive(); tick(true); };
}
setActive();

const cb = u => u + (u.includes('?')?'&':'?') + 't=' + Date.now();

/* ========================
   Helpers
   ======================== */

/* Parse epoch depuis le texte d’age.txt (robuste) */
function normalizeEpoch(raw){
  if (raw == null) return null;
  let s = String(raw).replace(/^\uFEFF/,'').trim();
  if (!/^\d+$/.test(s)) s = s.replace(/[^\d]/g,'');
  if (!s) return null;
  let ms = Number(s);
  if (ms < 1e12) ms *= 1000;
  // si futur improbable → corrige fuseau local
  const now = Date.now();
  if (ms - now > 10*60*1000){
    const offsetMin = new Date().getTimezoneOffset();
    ms = ms - offsetMin*60000;
  }
  return ms;
}

/* Lit age.txt côté SP (avec cookies d’entreprise) */
async function readAgeSP(url){
  try{
    const r = await fetch(cb(url), {cache:'no-store', credentials:'include'});
    if(!r.ok) return {ms:null, why:'HTTP '+r.status};
    const raw = await r.text();
    const ms  = normalizeEpoch(raw);
    if (!Number.isFinite(ms)) return {ms:null, why:'parse'};
    return {ms, why:null};
  }catch(e){ return {ms:null, why:'fetch'}; }
}

/* Extrait le timestamp UTC (ms) du nom ‘prefix_YYYYMMDDTHHMMSSZ.png’ */
function tsFromMirrorName(name, prefix){
  const re = new RegExp(`^${prefix}(\\d{8}T\\d{6}Z)\\.png$`, 'i');
  const m = name.match(re);
  if (!m) return null;
  const ts = m[1]; // ex: 20251101T223620Z
  const y = +ts.slice(0,4), mo=+ts.slice(4,6)-1, d=+ts.slice(6,8);
  const h = +ts.slice(9,11), mi=+ts.slice(11,13), s=+ts.slice(13,15);
  return Date.UTC(y,mo,d,h,mi,s); // en ms
}

/* Liste l’API GitHub pour trouver le dernier fichier miroir d’un dépôt */
async function lastMirrorItem(prefix){
  try{
    const r = await fetch(cb(MIRROR_DIR_API), {cache:'no-store'});
    if(!r.ok) return {url:null, ts:null, why:'GitHub API dir HTTP '+r.status};
    const arr = await r.json(); // [{name, type, ...}]
    const candidates = (arr||[]).filter(it => it.type==='file' && it.name.toLowerCase().startsWith(prefix));
    if (candidates.length===0) return {url:null, ts:null, why:'mirror vide'};
    // on calcule le ts via le nom et on garde le plus récent
    let best = null;
    for(const it of candidates){
      const ms = tsFromMirrorName(it.name, prefix);
      if (ms!=null && (!best || ms>best.ts)){ best = {name: it.name, ts: ms}; }
    }
    if (!best) return {url:null, ts:null, why:'noms non conformes'};
    return {url: MIRROR_DIR_PAGES + best.name, ts: best.ts, why:null};
  }catch(e){ return {url:null, ts:null, why:'fetch'}; }
}

/* Affiche une image (SP ou Miroir) */
function show(src, label){
  return new Promise(resolve=>{
    img.onload  = ()=>{ stamp.textContent = `${label} • ${new Date().toLocaleString()}`; resolve(true); };
    img.onerror = ()=>{ stamp.textContent = `${label} KO • ${new Date().toLocaleString()}`; resolve(false); };
    img.src = cb(src);
  });
}

/* ========================
   Boucle principale
   ======================== */
async function tick(force=false){
  const cfg = DATA[depot];
  let diag = `Depot: ${depot}\n`;

  // 1) Essai âge SP
  const a = await readAgeSP(cfg.spAge);
  let ageMs = null, ageFrom = null;

  if (a.ms !== null){
    ageMs = Date.now() - a.ms;
    ageFrom = 'SP';
    diag += `age(SP) OK • Δ=${Math.round(ageMs/1000)}s`;
  } else {
    diag += `age(SP) indisponible (${a.why})`;
    // 2) Fallback : calcul âge via le DERNIER fichier miroir
    const last = await lastMirrorItem(cfg.mirrorPrefix);
    if (last.ts!=null){
      ageMs = Date.now() - last.ts;
      ageFrom = 'Miroir';
      diag += `\nâge via miroir • Δ=${Math.round(ageMs/1000)}s`;
    } else {
      diag += `\nmirror listing KO (${last.why})`;
    }
  }

  // Si on a un âge (SP ou Miroir) et qu'il est trop vieux → erreur
  if (ageMs!=null && ageMs >= STALE_MS){
    await show(ERR_IMG_SP, "Erreur (retard ≥5min)");
    note.textContent = diag + `\n→ Erreur (origine : ${ageFrom} en retard)`;
    return;
  }

  // 3) On affiche l’image :
  //    - SP en premier si possible
  const okSp = await show(cfg.spImg, "SP");
  if (okSp){
    note.textContent = diag + `\nsource: SP`;
    return;
  }

  //    - Sinon le DERNIER miroir (pas un fichier stable)
  const last = await lastMirrorItem(cfg.mirrorPrefix);
  if (last.url){
    const okMir = await show(last.url, "Miroir");
    if (okMir){
      note.textContent = diag + `\nsource: Miroir (dernier fichier)`;
      return;
    } else {
      diag += `\nimage miroir KO`;
    }
  } else {
    diag += `\nmirror introuvable (${last.why})`;
  }

  //    - Sinon erreur
  await show(ERR_IMG_SP, "Erreur");
  note.textContent = diag + `\n→ Erreur (sources indisponibles)`;
}

setInterval(()=>tick(false), REFRESH_MS);
tick(true);
</script>
</body>
</html>
