<!doctype html>
<html lang="fr">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>TDID Live – Brel / Delta / Erasm.</title>
<style>
  :root{--bg:#0f1115;--fg:#eaeef5;--card:#141923;--line:#1e2330;--accent:#1a5bff;--ok:#18c58f;--warn:#f2b636;--err:#ff4d4f}
  html,body{height:100%;margin:0;background:var(--bg);color:var(--fg);font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif}
  body{padding-top:64px}
  .top{position:fixed;top:0;left:0;right:0;height:64px;display:flex;gap:8px;align-items:center;padding:10px 12px;background:#12151bde;border-bottom:1px solid var(--line);backdrop-filter:blur(6px);z-index:10}
  .brand{font-weight:700;margin-right:8px}
  .btn{padding:8px 14px;border:1px solid var(--line);border-radius:12px;background:var(--card);color:var(--fg);cursor:pointer}
  .btn.active{background:var(--accent);color:#fff;border-color:transparent}
  .wrap{height:calc(100vh - 64px);display:flex;align-items:center;justify-content:center}
  img{max-width:100%;max-height:100%;object-fit:contain}
  .status{display:flex;align-items:center;gap:8px;margin-left:auto}
  .dot{width:10px;height:10px;border-radius:50%}
  .dot.ok{background:var(--ok)} .dot.warn{background:var(--warn)} .dot.err{background:var(--err)}
  .stamp{opacity:.9;font-size:.9em}
  .note{position:fixed;bottom:8px;left:50%;transform:translateX(-50%);opacity:.85;font-size:.85em;text-align:center;white-space:pre-line;max-width:92vw}
</style>
</head>
<body>
  <div class="top">
    <span class="brand">TDID Live</span>
    <button class="btn" id="brel">Brel</button>
    <button class="btn" id="delta">Delta</button>
    <button class="btn" id="erasme">Erasm.</button>

    <div class="status">
      <span id="led" class="dot"></span>
      <span class="stamp" id="stamp">—</span>
    </div>
  </div>

  <div class="wrap"><img id="view" alt="TDID Live"></div>
  <div class="note" id="note"></div>

<script>
/* ============================
   CONFIG
   ============================ */

/* Token : si présent dans le même dossier que l’index (recommandé). Laisse vide sinon. */
let GH_TOKEN = "";

/* SharePoint paths */
const SP_BASE   = "https://stibmivb-my.sharepoint.com/personal/florent_legrain_stib_brussels";
const SP_FOLDER = "/personal/florent_legrain_stib_brussels/Documents/LiveMirror";
const spRaw = f => `${SP_BASE}/_layouts/15/download.aspx?SourceUrl=${encodeURIComponent(SP_FOLDER + "/" + f)}`;

const DATA_SP = {
  brel:   { img: spRaw("live_brel.png"),   age: spRaw("live_brel.age.txt")   },
  delta:  { img: spRaw("live_delta.png"),  age: spRaw("live_delta.age.txt")  },
  erasme: { img: spRaw("live_erasme.png"), age: spRaw("live_erasme.age.txt") }
};

/* GitHub repo */
const GH_USER  = "Flo-App-bxl";
const GH_REPO  = "TDID-Live";
const GH_BRANCH= "main";
const API_BASE = "https://api.github.com";
const GH_RAW_BASE = `https://raw.githubusercontent.com/${GH_USER}/${GH_REPO}/${GH_BRANCH}`;
const MIRROR_DIR = { brel:"mirror_brel", delta:"mirror_delta", erasme:"mirror_erasme" };

/* RAW latest fallback (si API KO) */
const MIRROR_LATEST = {
  brel:   `${GH_RAW_BASE}/time_brel/latest.json`,
  delta:  `${GH_RAW_BASE}/time_delta/latest.json`,
  erasme: `${GH_RAW_BASE}/time_erasme/latest.json`
};

const ERR_IMG_SP = `${GH_RAW_BASE}/TDID_Erreur.png`;
const REFRESH_MS = 3000;
const STALE_MS   = 10 * 60 * 1000; // 10 min

/* ====== UI ====== */
const img   = document.getElementById('view');
const stamp = document.getElementById('stamp');
const note  = document.getElementById('note');
const led   = document.getElementById('led');
const btns  = { brel:document.getElementById('brel'), delta:document.getElementById('delta'), erasme:document.getElementById('erasme') };

let depot = localStorage.getItem('tdid_depot') || 'brel';
function setActive(){ for(const k in btns){ btns[k].classList.toggle('active', k===depot); } }
for(const k in btns){ btns[k].onclick = () => { depot=k; localStorage.setItem('tdid_depot', depot); setActive(); tick(true); }; }
setActive();

const cb = u => u + (u.includes('?')?'&':'?') + 't=' + Date.now();

function setTop(status, label){
  led.className = 'dot ' + (status==='ok'?'ok':status==='warn'?'warn':'err');
  stamp.textContent = `${label} • ${new Date().toLocaleString()}`;
}

/* --- utils --- */
function normalizeEpoch(raw){
  if (raw == null) return null;
  let s = String(raw).replace(/^\uFEFF/,'').trim();
  if (!/^\d+$/.test(s)) s = s.replace(/[^\d]/g,'');
  if (!s) return null;
  let ms = Number(s);
  if (!Number.isFinite(ms)) return null;
  if (ms < 1e12) ms *= 1000;
  const now = Date.now();
  if (ms - now > 10*60*1000){
    const offsetMin = new Date().getTimezoneOffset();
    ms = ms - offsetMin*60000;
  }
  return ms;
}

async function readAgeSP(url){
  try{
    const r = await fetch(cb(url), {cache:'no-store', credentials:'include'});
    if(!r.ok) return {ms:null, why:'HTTP '+r.status};
    const raw = await r.text();
    const ms  = normalizeEpoch(raw);
    if (!Number.isFinite(ms)) return {ms:null, why:'parse'};
    return {ms, why:null};
  }catch(e){ return {ms:null, why:'fetch'}; }
}

/* ============================
   Throttling anti-rate-limit
   ============================ */
const LATEST_CACHE_TTL = 60000; // 60 s
const latestCache = {
  brel:   { ts:null, url:null, updated:null, tFetch:0 },
  delta:  { ts:null, url:null, updated:null, tFetch:0 },
  erasme: { ts:null, url:null, updated:null, tFetch:0 }
};

/* ============================
   Chargement token local (optionnel)
   ============================ */
async function loadTokenIfPresent(){
  try{
    const r = await fetch("token.txt", {cache:'no-store'});
    if (!r.ok) return;
    const t = (await r.text()).trim();
    if (t) GH_TOKEN = t;
  }catch(e){}
}

/* ============================
   latest.json : API avec token -> sans token -> RAW fallback
   ============================ */
async function loadLatest(depotKey){
  const now = Date.now();
  const cache = latestCache[depotKey];
  if (cache.ts && (now - cache.tFetch) < LATEST_CACHE_TTL){
    return { url: cache.url, ts: cache.ts, updated: cache.updated };
  }

  // petite fonction utilitaire pour valider & stocker
  function storeFromJson(j){
    const it = j?.items?.[depotKey];
    if (!it || !Number.isFinite(it.ts)) return null;
    let url = it.url;
    if (!url){
      const fname = (it.file||'').split('/').pop();
      if (!fname) return null;
      url = `${GH_RAW_BASE}/${MIRROR_DIR[depotKey]}/${fname}`;
    }
    cache.ts = it.ts*1000;
    cache.url = url;
    cache.updated = j.updated_iso || null;
    cache.tFetch = now;
    return { url: cache.url, ts: cache.ts, updated: cache.updated };
  }

  // 1) API avec token si dispo
  try{
    const headers = { 'Accept':'application/vnd.github+json' };
    if (GH_TOKEN) headers['Authorization'] = `Bearer ${GH_TOKEN}`;

    const refUrl = `${API_BASE}/repos/${GH_USER}/${GH_REPO}/git/refs/heads/${GH_BRANCH}`;
    const refRes = await fetch(cb(refUrl), {cache:'no-store', headers});
    if (!refRes.ok) throw new Error('ref:'+refRes.status);
    const ref = await refRes.json();
    const headSha = ref?.object?.sha;
    if (!headSha) throw new Error('no head');

    const latestPath = `time_${depotKey}/latest.json`;
    const contUrl = `${API_BASE}/repos/${GH_USER}/${GH_REPO}/contents/${latestPath}?ref=${headSha}`;
    const cRes = await fetch(cb(contUrl), {cache:'no-store', headers});
    if (!cRes.ok) throw new Error('contents:'+cRes.status);
    const c = await cRes.json();
    if (!c?.content) throw new Error('no content');

    const txt = atob(c.content.replace(/\s/g,''));
    return storeFromJson(JSON.parse(txt));
  }catch(e){
    // continue
  }

  // 2) API SANS token (public)
  try{
    const headers = { 'Accept':'application/vnd.github+json' }; // pas d'Authorization
    const refUrl = `${API_BASE}/repos/${GH_USER}/${GH_REPO}/git/refs/heads/${GH_BRANCH}`;
    const refRes = await fetch(cb(refUrl), {cache:'no-store', headers});
    if (!refRes.ok) throw new Error('ref:'+refRes.status);
    const ref = await refRes.json();
    const headSha = ref?.object?.sha;
    if (!headSha) throw new Error('no head');

    const latestPath = `time_${depotKey}/latest.json`;
    const contUrl = `${API_BASE}/repos/${GH_USER}/${GH_REPO}/contents/${latestPath}?ref=${headSha}`;
    const cRes = await fetch(cb(contUrl), {cache:'no-store', headers});
    if (!cRes.ok) throw new Error('contents:'+cRes.status);
    const c = await cRes.json();
    if (!c?.content) throw new Error('no content');

    const txt = atob(c.content.replace(/\s/g,''));
    return storeFromJson(JSON.parse(txt));
  }catch(e){
    // continue
  }

  // 3) Fallback RAW (peut être “stale” mais évite l’indispo)
  try{
    const url = cb(MIRROR_LATEST[depotKey]);
    const r = await fetch(url, {cache:'no-store'});
    if (!r.ok) throw new Error('raw:'+r.status);
    return storeFromJson(await r.json());
  }catch(e){
    // si on a un cache précédent, on le réutilise
    if (latestCache[depotKey].ts) return { url: cache.url, ts: cache.ts, updated: cache.updated };
    return null;
  }
}

/* ============================
   images
   ============================ */
function preload(src, withCred=false){
  return new Promise(res=>{
    const test = new Image();
    if (withCred) test.referrerPolicy = 'no-referrer-when-downgrade';
    test.onload  = ()=>res(true);
    test.onerror = ()=>res(false);
    test.src = cb(src);
  });
}

async function renderFrom(src, statusLabel){
  return new Promise(resolve=>{
    const loader = new Image();
    loader.onload = ()=>{ img.src = loader.src; setTop(statusLabel.status, statusLabel.text); resolve(true); };
    loader.onerror= ()=>{ setTop('err', statusLabel.text + ' KO'); resolve(false); };
    loader.src = cb(src);
  });
}

/* ============================
   boucle
   ============================ */
async function tick(force=false){
  const sp = DATA_SP[depot];
  let diag = `Depot: ${depot}\n`;

  const latest = await loadLatest(depot);
  if (!latest){
    diag += "latest.json indisponible (API+RAW)";
    const okSP = await preload(sp.img, true);
    if (okSP){
      await renderFrom(sp.img, {status:'ok', text:'SP'});
      note.textContent = diag + "\nsource: SP (sans âge miroir)";
    } else {
      await renderFrom(ERR_IMG_SP, {status:'err', text:'Erreur'});
      note.textContent = diag + "\n→ Erreur : pas de miroir et SP KO";
    }
    return;
  }

  const ageMs = Date.now() - latest.ts;
  const ageSec = Math.round(ageMs/1000);
  const stale = ageMs >= STALE_MS;
  diag += `age(miroir) • Δ=${ageSec}s → ${stale?'STALE':'OK'}`;

  if (stale){
    await renderFrom(ERR_IMG_SP, {status:'err', text:'Erreur (miroir ≥10min)'});
    note.textContent = diag + "\n→ Erreur (miroir en retard)";
    return;
  }

  const spOK = await preload(sp.img, true);
  if (spOK){
    await renderFrom(sp.img, {status:'ok', text:'SP'});
    note.textContent = diag + "\nsource: SP";
    return;
  }

  const mirOK = await preload(latest.url, false);
  if (mirOK){
    await renderFrom(latest.url, {status:'warn', text:'Miroir'});
    note.textContent = diag + "\nsource: Miroir";
  } else {
    await renderFrom(ERR_IMG_SP, {status:'err', text:'Erreur'});
    note.textContent = diag + "\n→ Erreur (miroir & SP KO)";
  }
}

/* ============================
   bootstrap
   ============================ */
async function start(){
  await loadTokenIfPresent(); // silencieux si absent
  setInterval(()=>tick(false), REFRESH_MS);
  tick(true);
}

start();
</script>
</body>
</html>
