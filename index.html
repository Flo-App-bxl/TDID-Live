<!doctype html>
<html lang="fr">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>TDID Live – SP prioritaire + Miroir 15 min + Plein écran + Sidebar mobile</title>

<!-- Icônes -->
<link rel="icon" type="image/jpeg" href="https://raw.githubusercontent.com/Flo-App-bxl/TDID-Live/main/assets/intro_poster.jpg">
<link rel="shortcut icon" type="image/jpeg" href="https://raw.githubusercontent.com/Flo-App-bxl/TDID-Live/main/assets/intro_poster.jpg">
<link rel="apple-touch-icon" href="https://raw.githubusercontent.com/Flo-App-bxl/TDID-Live/main/assets/intro_poster.jpg">
<meta name="theme-color" content="#0f1115" />

<style>
  :root{--bg:#0f1115;--fg:#eaeef5;--card:#141923;--line:#1e2330;--accent:#1a5bff;--ok:#18c58f;--warn:#f2b636;--err:#ff4d4f}
  html,body{height:100%;margin:0;background:var(--bg);color:var(--fg);font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif}
  body{display:flex;flex-direction:column}
  .top{flex-shrink:0;height:64px;display:flex;gap:8px;align-items:center;padding:10px 12px;background:#12151bde;border-bottom:1px solid var(--line);z-index:5}
  .brand{font-weight:700;margin-right:8px}
  .btn{padding:8px 14px;border:1px solid var(--line);border-radius:12px;background:#141923;color:var(--fg);cursor:pointer}
  .btn.active{background:var(--accent);color:#fff;border-color:transparent}
  .status{display:flex;align-items:center;gap:8px;margin-left:auto}
  .dot{width:10px;height:10px;border-radius:50%}
  .dot.ok{background:var(--ok)} .dot.warn{background:var(--warn)} .dot.err{background:var(--err)}
  .stamp{opacity:.9;font-size:.9em}
  .toggle{padding:6px 10px;border:1px solid var(--line);border-radius:10px;background:#1b2130;color:#fff;cursor:pointer;font-size:.85em;display:none}
  .toggle.active{background:#2a3347}

  .wrap{flex:1;display:flex;align-items:center;justify-content:center;overflow:hidden;position:relative}
  img{max-width:100%;max-height:100%;object-fit:contain;display:block;margin:auto}

  .note{position:fixed;bottom:6px;left:50%;transform:translateX(-50%);opacity:.9;font-size:.85em;text-align:center;white-space:nowrap;max-width:96vw;overflow:hidden;text-overflow:ellipsis;z-index:6}

  .banner{
    position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);
    background:rgba(242,182,54,0.7);color:#000;padding:24px 28px;border-radius:16px;
    font-weight:700;font-size:1.2em;z-index:20;display:none;overflow:hidden;white-space:nowrap;width:80vw;text-align:center;
  }
  .banner span{display:inline-block;padding-left:100%;animation:scrollText 15s linear infinite;}
  @keyframes scrollText{0%{transform:translateX(0);}100%{transform:translateX(-100%);}}

  /* Splash vidéo */
  .splash{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;background:#0f1115e0;z-index:30}
  .splash video{max-width:80vw;border-radius:10px}
  .splash .skip{position:absolute;bottom:20px;right:20px;padding:8px 14px;background:#1b2130;color:#fff;border:1px solid var(--line);border-radius:10px;cursor:pointer}

  /* Indication rotation mobile */
  .rotate{position:absolute;inset:0;display:none;align-items:center;justify-content:center;background:#0f1115cf;z-index:25}
  .rotate .box{padding:16px 20px;border:1px solid var(--line);border-radius:12px;background:#161a24;text-align:center}

  /* Bouton plein écran */
  .fsbtn{position:fixed;right:12px;top:72px;z-index:26;padding:8px 12px;border-radius:10px;border:1px solid var(--line);
    background:#141923;color:#fff;font-size:.9em;display:none;cursor:pointer;}

  /* ——— Mobile tweaks ——— */
  @media (pointer:coarse){
    .top{height:52px;padding:8px}
    .btn{padding:6px 10px}
    .banner{font-size:1.05em}
  }

  /* ——— Mobile + paysage : barre latérale à gauche ——— */
  @media (pointer:coarse) and (orientation:landscape){
    body{flex-direction:row}
    .top{
      position:fixed;left:0;top:0;bottom:0;height:100vh;width:78px;border-bottom:none;border-right:1px solid var(--line);
      flex-direction:column;align-items:center;gap:10px;padding:10px 6px;background:#12151bf2
    }
    .brand{writing-mode:vertical-rl;transform:rotate(180deg);margin:0}
    .btn{padding:8px 6px;border-radius:10px;width:100%}
    .status{margin-left:0;flex-direction:column;gap:6px}
    .stamp{writing-mode:vertical-rl;transform:rotate(180deg);font-size:.75em}
    .wrap{margin-left:78px}
    img{width:100vw;height:100vh;object-fit:contain}
    .note{left:calc(50% + 39px)}
    .fsbtn{top:12px;right:12px}
  }
</style>
</head>
<body>
  <div class="top" id="topbar">
    <span class="brand">TDID Live</span>
    <button class="btn" id="brel">Brel</button>
    <button class="btn" id="delta">Delta</button>
    <button class="btn" id="erasme">Erasm.</button>
    <div class="status">
      <button id="forceMirror" class="toggle">Miroir 15 min</button>
      <span id="led" class="dot"></span>
      <span id="stamp">—</span>
    </div>
  </div>

  <button id="fsbtn" class="fsbtn">🔳 Plein écran</button>

  <div class="banner" id="banner">
    <span>Refresh &gt; 5 min – vérifier fiabilité via ‘Last Refresh’ • Refresh &gt; 5 min – controleer betrouwbaarheid via ‘Last Refresh’</span>
  </div>

  <div class="wrap">
    <div class="splash" id="splash">
      <video id="intro" autoplay muted playsinline preload="auto"
        src="https://raw.githubusercontent.com/Flo-App-bxl/TDID-Live/main/assets/intro.mp4"></video>
      <button class="skip" id="skipIntro">Passer</button>
    </div>

    <div class="rotate" id="rotateHint">
      <div class="box">
        📱 Tournez votre téléphone en mode paysage<br/>
        📱 Draai uw telefoon naar de liggende stand
      </div>
    </div>

    <img id="view" alt="TDID Live" />
  </div>
  <div class="note" id="note"></div>

<script>
/* ====== Constantes ====== */
const GH_USER="Flo-App-bxl", GH_REPO="TDID-Live", GH_BRANCH="main";
const GH_RAW = `https://raw.githubusercontent.com/${GH_USER}/${GH_REPO}/${GH_BRANCH}`;
const GH_API = `https://api.github.com/repos/${GH_USER}/${GH_REPO}/contents`;
const JSDELIVR = `https://cdn.jsdelivr.net/gh/${GH_USER}/${GH_REPO}@${GH_BRANCH}`;
const MIRROR_DIR={brel:"mirror_brel",delta:"mirror_delta",erasme:"mirror_erasme"};
const ERR_IMG=`${GH_RAW}/TDID_Erreur.png`;

const REFRESH_MS=6000, FETCH_MIN=60000, MIRROR_FORCE_MS=60000, BANNER_GT5=5*60000, MIRROR_ERR_10=10*60000, CACHE_MIRROR_TTL=60000;
/* Seuil SP → force API latest.json si Δ>280s */
const SP_FORCE_API_GT = 280 * 1000;

/* SharePoint */
const SP_BASE="https://stibmivb-my.sharepoint.com/personal/florent_legrain_stib_brussels";
const SP_FOLDER="/personal/florent_legrain_stib_brussels/Documents/LiveMirror";
const spRaw=f=>`${SP_BASE}/_layouts/15/download.aspx?SourceUrl=${encodeURIComponent(SP_FOLDER+"/"+f)}&t=${Date.now()}`;
const DATA_SP={brel:{img:spRaw("live_brel.png")},delta:{img:spRaw("live_delta.png")},erasme:{img:spRaw("live_erasme.png")}};

/* ====== UI refs ====== */
const img=document.getElementById('view'), note=document.getElementById('note'),
      led=document.getElementById('led'), stamp=document.getElementById('stamp'),
      banner=document.getElementById('banner'),
      intro=document.getElementById('intro'), splash=document.getElementById('splash'),
      skip=document.getElementById('skipIntro'), fsBtn=document.getElementById('fsbtn'),
      forceBtn=document.getElementById('forceMirror'),
      rotateHint=document.getElementById('rotateHint');

/* ====== Détection mobile + FS ====== */
function isMobile(){return /Android|iPhone|iPad|iPod|Mobile/i.test(navigator.userAgent)|| (matchMedia&&matchMedia("(pointer:coarse)").matches);}
function isLandscape(){return window.innerWidth>window.innerHeight;}
function updateRotateHint(){ if(!isMobile()){rotateHint.style.display='none';return;} rotateHint.style.display=isLandscape()?'none':'flex'; }
window.addEventListener('resize', updateRotateHint);
window.addEventListener('orientationchange', updateRotateHint);
updateRotateHint();

function canFS(){return !!document.documentElement.requestFullscreen;}
async function enterFS(){try{await document.documentElement.requestFullscreen();return true;}catch{return false;}}
let userInteracted=false;document.addEventListener('click',()=>{userInteracted=true;});document.addEventListener('touchstart',()=>{userInteracted=true;});
async function tryAutoFS(){ if(!isMobile()||!isLandscape()||!canFS()) {fsBtn.style.display='none'; return;} if(userInteracted){ const ok=await enterFS(); fsBtn.style.display=ok?'none':'inline-block'; } else { fsBtn.style.display='inline-block'; } }
fsBtn.addEventListener('click', async()=>{ const ok=await enterFS(); if(ok) fsBtn.style.display='none'; });
window.addEventListener('orientationchange', tryAutoFS);
window.addEventListener('resize', tryAutoFS);

/* ====== Sélection dépôt ====== */
const btns={brel:document.getElementById('brel'),delta:document.getElementById('delta'),erasme:document.getElementById('erasme')};
let depot=localStorage.getItem('tdid_depot')||'brel';
function setActive(){for(const k in btns){btns[k].classList.toggle('active',k===depot);}}
for(const k in btns){btns[k].onclick=()=>{depot=k;localStorage.setItem('tdid_depot',k);forceFetch=true;preferSPNext=true;setActive();tick();};}
setActive();

/* ====== Splash vidéo ====== */
skip.onclick=()=>splash.style.display='none'; setTimeout(()=>splash.style.display='none',8000);

/* ====== États ====== */
let latest={brel:null,delta:null,erasme:null};
let lastFetchAt={brel:0,delta:0,erasme:0};
let lastHttp={brel:'',delta:'',erasme:''};
let lastSource={brel:'',delta:'',erasme:''};
let lastMirror={brel:null,delta:null,erasme:null}; // {url,time}
let forceFetch=true;
let bannerLatch={brel:false,delta:false,erasme:false};

let isMirror=false, mirrorTimer=null;
let preferSPNext=false;

/* ====== Override “Miroir 15 min” ====== */
const OV_KEY='tdid_mirror_override_until';
function overrideActive(){const t=+localStorage.getItem(OV_KEY)||0;return Date.now()<t;}
function setOverride(min){localStorage.setItem(OV_KEY,String(Date.now()+min*60000)); updateBtn(true); forceFetch=true; enterMirror(true); tick();}
function clearOverride(){localStorage.removeItem(OV_KEY); updateBtn(false); leaveMirror(); preferSPNext=true; forceFetch=true; tick();}
function updateBtn(activeNow){
  const on = activeNow ?? overrideActive();
  forceBtn.classList.toggle('active',on);
  forceBtn.textContent = on ? "Miroir (forcé) ⏱ – Stop" : "Miroir 15 min";
  const show = (!isMirror) || on; // visible en SP, ou en miroir si override actif
  forceBtn.style.display = show ? 'inline-block' : 'none';
}
forceBtn.addEventListener('click', ()=>{ overrideActive()?clearOverride():setOverride(15); });

/* ====== Mode miroir ====== */
function enterMirror(startupKick=true){
  if(!isMirror){
    isMirror=true; updateBtn();
    if(startupKick) fetchLatest(depot,true).catch(()=>{});
    if(mirrorTimer) clearInterval(mirrorTimer);
    mirrorTimer=setInterval(()=>{ if(isMirror) fetchLatest(depot,true).catch(()=>{}); }, MIRROR_FORCE_MS);
  }
}
function leaveMirror(){
  isMirror=false; updateBtn();
  if(mirrorTimer){ clearInterval(mirrorTimer); mirrorTimer=null; }
}

/* ====== Helpers ====== */
function setTop(status,label){led.className='dot '+(status==='ok'?'ok':status==='warn'?'warn':'err');stamp.textContent=`${label} • ${new Date().toLocaleString()}`;}
function showBanner(show){banner.style.display=show?'block':'none';}
function renderFrom(src,statusLabel){return new Promise(res=>{const t=new Image();t.onload=()=>{img.src=t.src;setTop(statusLabel.status,statusLabel.text);res(true);};t.onerror=()=>res(false);t.src=src+(src.includes('?')?'&':'?')+'t='+Date.now();});}
function dbg(parts){ note.textContent = parts.filter(Boolean).join(' | '); }

/* ====== SP loader (fetch→blob sinon <img>) ====== */
async function loadSpImage(k){
  const u = DATA_SP[k].img; let via='fetch';
  try{
    const r=await fetch(u,{cache:'no-store',credentials:'include',mode:'cors'});
    if(r.ok){const b=await r.blob(); return {ok:true,url:URL.createObjectURL(b),via};}
  }catch(e){}
  via='img';
  const okImg = await new Promise(res=>{const im=new Image();im.onload=()=>res(true);im.onerror=()=>res(false);im.referrerPolicy='no-referrer-when-downgrade';im.src=u;});
  if(okImg) return {ok:true,url:u,via};
  return {ok:false,reason:'Load failed'};
}

/* ====== latest.json (avec trace/debug) ====== */
async function fetchLatest(k, forceApi=false){
  const now=Date.now();
  if(!forceApi && !forceFetch && now-lastFetchAt[k]<FETCH_MIN && latest[k]) return latest[k];

  const path = k==='brel'?'/time_brel/latest.json' : k==='delta'?'/time_delta/latest.json' : '/time_erasme/latest.json';
  const urls = [
    {u:`${GH_RAW}${path}?x_bypass=${Math.floor(now/60000)}`, tag:'RAW'},
    {u:`${JSDELIVR}${path}?x_bypass=${Math.floor(now/60000)}`, tag:'CDN'},
    {u:`${GH_API}${path}?ref=${GH_BRANCH}&_=${now}`, tag: forceApi ? 'API*' : 'API'}
  ];
  let trace=[], source='-';
  async function tryJson(u,tag,init){
    try{ const r=await fetch(u,{cache:'no-store',...init}); trace.push(`${tag}:${r.status}`); if(!r.ok) return null; source=tag; return await r.json(); }
    catch{ trace.push(`${tag}:fail`); return null; }
  }

  let j=null;
  if(forceApi){
    j = await tryJson(urls[2].u, urls[2].tag, {headers:{'Accept':'application/vnd.github.v3.raw'}});
    if(!j) j = await tryJson(urls[0].u, urls[0].tag);
    if(!j) j = await tryJson(urls[1].u, urls[1].tag, {headers:{'Accept':'application/json'}});
  }else{
    j = await tryJson(urls[0].u, urls[0].tag);
    if(!j) j = await tryJson(urls[1].u, urls[1].tag, {headers:{'Accept':'application/json'}});
    if(!j) j = await tryJson(urls[2].u, urls[2].tag, {headers:{'Accept':'application/vnd.github.v3.raw'}});
  }

  lastFetchAt[k]=now; lastHttp[k]=trace.join(' '); lastSource[k]=source;
  if(!j) throw new Error('all fetch attempts failed');

  const it=j?.items?.[k]; if(!it?.ts) throw new Error('bad json');
  let imgUrl=it.url;
  if(!imgUrl){
    const f=(it.file||'').split('/').pop();
    if(!f) throw new Error('no file');
    imgUrl = `${GH_RAW}/${MIRROR_DIR[k]}/${f}`;
  }
  latest[k]={ts:Number(it.ts)*1000, url:imgUrl};
  forceFetch=false;
  return latest[k];
}

/* ====== Tick principal ====== */
async function tick(){
  const k=depot;

  // Plein écran auto si rotation paysage sur mobile
  tryAutoFS();

  const override = overrideActive();
  const preferSPThisTick = preferSPNext; preferSPNext = false;

  // Toujours préférer SP si pas d'override (même en miroir)
  if(!override){
    const sp = await loadSpImage(k);
    if(sp.ok){
      leaveMirror();
      updateBtn(false);
      await renderFrom(sp.url,{status:'ok',text:'SP'});

      try{
        // 1) lecture latest.json (standard)
        let L = await fetchLatest(k);
        let ageMs = Date.now() - L.ts;
        let forced = false;

        // 2) SP : si Δ > 280s → force API latest.json
        if(ageMs > SP_FORCE_API_GT){
          const L2 = await fetchLatest(k, true);
          if(L2){ L = L2; ageMs = Date.now() - L.ts; forced = true; }
        }

        const ageSec=Math.round(ageMs/1000);
        bannerLatch[k] = ageMs > BANNER_GT5 ? true : false;
        showBanner(bannerLatch[k]);

        dbg([
          `mode: SP`,
          `SP: OK(${sp.via})`,
          `source latest: ${lastSource[k]}`,
          `trace: ${lastHttp[k]}`,
          `fetch: ${new Date(lastFetchAt[k]).toLocaleTimeString()}`,
          `Δ=${ageSec}s${forced?' (API@SP)':''}`,
          `bandeau: ${bannerLatch[k]?'ON>5m':'OFF'}`,
          `source: SP`
        ]);
      }catch(e){
        showBanner(bannerLatch[k]);
        dbg([
          `mode: SP`,
          `SP: OK(${sp.via})`,
          `latest: KO`,
          `trace: ${lastHttp[k]||e.message}`,
          `source: SP`
        ]);
      }
      return;
    }else{
      if(preferSPThisTick){
        dbg([`mode: SP?`, `SP: KO(${sp.reason||'?'})`, `hint: retry SP next tick`]);
      }
    }
  }

  // Mode Miroir (ou override)
  enterMirror(true);
  updateBtn();

  let L=null;
  try{ L = await fetchLatest(k,true); }
  catch(e){
    const cached=lastMirror[k];
    if(cached && (Date.now()-cached.time)<=CACHE_MIRROR_TTL){
      await renderFrom(cached.url,{status:'warn',text:'Miroir cache (≤60s)'}); showBanner(false);
      dbg([`mode: Miroir`, `API: KO`, `affiche: cache ≤60s`]); return;
    }
    await renderFrom(ERR_IMG,{status:'err',text:'Erreur'}); showBanner(false);
    dbg([`mode: Miroir`, `API: KO`, `affiche: erreur`]); return;
  }

  const ageMs=Date.now()-L.ts, ageSec=Math.round(ageMs/1000);
  if(ageMs>MIRROR_ERR_10){
    await renderFrom(ERR_IMG,{status:'err',text:'Erreur (miroir >10min)'}); showBanner(false);
    dbg([
      `mode: Miroir`,
      `source latest: ${lastSource[k]}`,
      `trace: ${lastHttp[k]}`,
      `fetch: ${new Date(lastFetchAt[k]).toLocaleTimeString()}`,
      `Δ=${ageSec}s`,
      `affiche: erreur`
    ]);
    return;
  }

  const okMir=await renderFrom(L.url,{status:'warn',text:'Miroir'});
  if(okMir){
    lastMirror[k]={url:L.url,time:Date.now()};
    showBanner(false);
    dbg([
      `mode: Miroir`,
      `source latest: ${lastSource[k]}`,
      `trace: ${lastHttp[k]}`,
      `fetch: ${new Date(lastFetchAt[k]).toLocaleTimeString()}`,
      `Δ=${ageSec}s`,
      `affiche: miroir`
    ]);
    return;
  }

  const cached=lastMirror[k];
  if(cached && (Date.now()-cached.time)<=CACHE_MIRROR_TTL){
    await renderFrom(cached.url,{status:'warn',text:'Miroir cache (≤60s)'}); showBanner(false);
    dbg([`mode: Miroir`, `miroir: KO`, `affiche: cache ≤60s`]);
  } else {
    await renderFrom(ERR_IMG,{status:'err',text:'Erreur (miroir KO >60s)'}); showBanner(false);
    dbg([`mode: Miroir`, `miroir: KO`, `affiche: erreur`]);
  }
}

/* ====== Start ====== */
setInterval(()=>{ updateBtn(); updateRotateHint(); tryAutoFS(); tick(); }, REFRESH_MS);
tick();
</script>
</body>
</html>
