name: Auto-clean folder

on:
  schedule:
    - cron: "*/3 * * * *"  # toutes les 3 minutes
  workflow_dispatch:         # permet aussi de le lancer à la main

jobs:
  cleanup:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Delete folder if too many files
        run: |
          FOLDER="mirror_brel"  # <--- dossier à surveiller
          MAX_FILES=10          # <--- limite de fichiers autorisée

          echo "Vérification du dossier $FOLDER..."
          COUNT=$(find "$FOLDER" -type f | wc -l || echo 0)
          echo "Nombre de fichiers détectés : $COUNT"

          if [ "$COUNT" -gt "$MAX_FILES" ]; then
            echo "⚠️ Trop de fichiers ($COUNT > $MAX_FILES), suppression du dossier..."
            rm -rf "$FOLDER"
          else
            echo "✅ Nombre de fichiers OK ($COUNT)"
          fi

      - name: Commit and push if changes
        run: |
          if [ -n "$(git status --porcelain)" ]; then
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add -A
            git commit -m "Auto-clean: suppression du dossier $FOLDER (plus de $MAX_FILES fichiers)"
            git push
          else
            echo "Aucun changement à pousser."
          fi
